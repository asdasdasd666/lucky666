<div class="control-row" id="head-wuxing-controls">
<span class="row-label select-label">头</span>
</div>
<div class="control-row" id="tail-controls">
<span class="row-label select-label">尾</span>
</div>
</div>
<!-- 杀号框 -->
<div class="control-box">
<div class="box-header kill-mode">杀号</div>
<div class="control-row" id="kill-head-wuxing-controls">
<span class="row-label kill-label">头</span>
</div>
<div class="control-row" id="kill-tail-controls">
<span class="row-label kill-label">尾</span>
</div>
<div class="control-row" id="kill-parity-controls"></div>
</div>
</div>
<div class="grid-container" id="grid"></div>
<div class="result-card">
<div class="result-header">
<span class="result-title">已选号码</span>
<span class="result-count" id="countDisplay">0个</span>
</div>
<div class="input-group">
<input type="text" id="smartInput" class="smart-input" placeholder="请输入号码 (如: 1 5 12)" autocomplete="off">
<button class="confirm-btn" id="confirmBtn" onclick="handleConfirm()">✔️</button>
</div>
<div class="input-hint">支持空格/逗号/点号分隔，按确定键点亮并清空</div>
<div class="result-text" id="resultDisplay">暂无选择</div>
<div class="action-btns">
<button class="action-btn btn-copy" onclick="copyResult()">复制</button>
<button class="action-btn btn-clear" onclick="clearData()">清空</button>
</div>
<div style="font-size: 0.75rem; font-weight: 700; color: #4a5568; margin-bottom: 4px; display:flex; justify-content:space-between;">
<span>📜 操作记录</span>
<span style="cursor:pointer; color:#718096;" onclick="clearLogs()">清空</span>
</div>
<div class="log-container" id="logContainer">
<div class="log-item" style="color:#a0aec0; justify-content:center;">暂无记录</div>
</div>
</div>
<div class="toast" id="toast">操作成功</div>
<script>
// --- PWA Service Worker Registration ---
if ('serviceWorker' in navigator) {
const CACHE_VERSION = 'v24-memory-state';
const CACHE_NAME = `lucky666-${CACHE_VERSION}`;
const swCode = `
const CACHE_NAME = '${CACHE_VERSION}';
self.addEventListener('install', e => { self.skipWaiting(); e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(['./']))); });
self.addEventListener('activate', e => { e.waitUntil(caches.keys().then(k => Promise.all(k.filter(x => x !== CACHE_NAME).map(x => caches.delete(x))))); self.clients.claim(); });
self.addEventListener('fetch', e => { e.respondWith(fetch(e.request).catch(() => caches.match(e.request))); });
`;
const blob = new Blob([swCode], {type: 'application/javascript'});
navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(console.error);
}
// --- 动态生成 Manifest ---
const manifestData = {
"name": "幸运666", "short_name": "幸运666", "start_url": ".", "display": "standalone",
"background_color": "#f0f4f8", "theme_color": "#f0f4f8", "orientation": "portrait",
"icons": [{ "src": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23e53e3e'/%3E%3Ctext x='50' y='65' font-family='Arial' font-size='42' font-weight='900' fill='white' text-anchor='middle' style='filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.3));'%3E666%3C/text%3E%3Ctext x='50' y='85' font-family='Arial' font-size='12' font-weight='bold' fill='white' text-anchor='middle' opacity='0.9'%3E幸运%3C/text%3E%3C/svg%3E", "sizes": "192x192", "type": "image/svg+xml" }]
};
const stringManifest = JSON.stringify(manifestData);
const blobManifest = new Blob([stringManifest], {type: 'application/json'});
const manifestURL = URL.createObjectURL(blobManifest);
document.querySelector('#manifest-placeholder').setAttribute('href', manifestURL);
let lastTouchEnd = 0;
document.addEventListener('touchend', function (event) {
const now = Date.now();
if (now - lastTouchEnd <= 300) event.preventDefault();
lastTouchEnd = now;
}, false);
document.addEventListener('contextmenu', event => { if(event.target.tagName !== 'INPUT') event.preventDefault(); });
const zodiacs = ["鼠", "牛", "虎", "兔", "龙", "蛇", "马", "羊", "猴", "鸡", "狗", "猪"];
const zodiacColors = ['zodiac-bg-red', 'zodiac-bg-blue', 'zodiac-bg-green', 'zodiac-bg-red', 'zodiac-bg-blue', 'zodiac-bg-green', 'zodiac-bg-red', 'zodiac-bg-blue', 'zodiac-bg-green', 'zodiac-bg-red', 'zodiac-bg-blue', 'zodiac-bg-green'];
const redGroup = new Set([7, 2, 1, 12, 8, 19, 18, 13, 24, 23, 30, 29, 35, 34, 40, 46, 45]);
const greenGroup = new Set([6, 5, 11, 17, 16, 22, 21, 28, 27, 33, 32, 43, 39, 38, 44, 49]);
const blueGroup = new Set([4, 3, 10, 9, 15, 14, 20, 31, 26, 25, 36, 42, 41, 37, 48, 47]);
const wuxingGroups = {
gold: new Set([5, 4, 12, 13, 27, 26, 35, 34, 42, 43]),
wood: new Set([9, 8, 24, 16, 17, 25, 46, 47, 38, 39]),
water: new Set([1, 22, 23, 14, 15, 30, 31, 45, 44]),
fire: new Set([3, 2, 11, 10, 18, 19, 33, 32, 48, 49, 40, 41]),
earth: new Set([7, 6, 20, 21, 28, 29, 36, 37])
};
const numToWuxing = {};
const wuxingChars = { gold: '金', wood: '木', water: '水', fire: '火', earth: '土' };
for (const [type, nums] of Object.entries(wuxingGroups)) { nums.forEach(n => numToWuxing[n] = type); }
function generateCustomGridData() {
const row1 = [7, 6, 5, 4, 3, 2, 1, 12, 11, 10, 9, 8];
const row2 = [19, 18, 17, 16, 15, 14, 13, 24, 23, 22, 21, 20];
const row3 = [31, 30, 29, 28, 27, 26, 25, 36, 35, 34, 33, 32];
const row4 = [43, 42, 41, 40, 39, 38, 37, 48, 47, 46, 45, 44];
const row5 = [null, null, null, null, null, null, 49, null, null, null, null, null];
return [row1, row2, row3, row4, row5];
}
const customGridRows = generateCustomGridData();
// 核心数据
let selectedNumbers = new Set();
let specialNumbers = new Set();
let historyStack = [];
let futureStack = [];
const MAX_HISTORY = 50;
// 杀号状态
let killRedOdd = false, killRedEven = false;
let killBlueOdd = false, killBlueEven = false;
let killGreenOdd = false, killGreenEven = false;
let killHeads = new Set();
let killTails = new Set();
let killWuxing = new Set();
// 按钮状态记忆池 (Key: buttonId, Value: Set of numbers before activation)
let buttonStateMemory = {};
// 按钮激活状态池 (Key: buttonId, Value: boolean)
let buttonActiveState = {};
function vibrate(pattern = 15) { if (navigator.vibrate) navigator.vibrate(pattern); }
function init() {
renderControls();
load_data();
renderGrid();
updateAllStates();
setupInputListener();
if(historyStack.length === 0) addLog("系统", "启动");
}
function setupInputListener() {
const input = document.getElementById('smartInput');
input.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.keyCode === 13) { e.preventDefault(); handleConfirm(); } });
}
function handleConfirm() {
const input = document.getElementById('smartInput');
const text = input.value.trim();
if (!text) { showToast("⚠️ 请输入号码"); return; }
processInput(text); input.value = ''; input.blur();
}
function processInput(text) {
const matches = text.match(/\d+/g);
if (!matches) { showToast("⚠️ 未识别到有效数字"); return; }
const validNumbers = [];
matches.forEach(match => { let num = parseInt(match, 10); if (num >= 1 && num <= 49 && !validNumbers.includes(num)) validNumbers.push(num); });
if (validNumbers.length > 0) {
saveState(); let changed = false;
validNumbers.forEach(num => {
if (!selectedNumbers.has(num)) {
selectedNumbers.add(num);
changed = true;
}
});
if (changed) { updateAllStates(); save_data(); addLog("input", `批量选中 ${validNumbers.length} 个号`); vibrate(30); showToast(`✅ 已点亮 ${validNumbers.length} 个号`); }
else { showToast("ℹ️ 这些号码已选中"); }
} else { showToast("⚠️ 无有效号码 (1-49)"); }
}
function addLog(type, message) {
const container = document.getElementById('logContainer');
if (container.children.length === 1 && container.children[0].textContent.includes("暂无")) container.innerHTML = '';
const now = new Date();
const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
const div = document.createElement('div'); div.className = 'log-item';
let actionClass = type === 'undo' ? 'undo' : (type === 'select' ? 'select' : (type === 'filter' ? 'filter' : (type === 'input' ? 'input' : (type === 'kill' ? 'kill' : 'clear'))));
div.innerHTML = `<span><span class="log-time">${timeStr}</span><span class="log-action ${actionClass}">${message}</span></span>`;
container.prepend(div);
if (container.children.length > 15) container.removeChild(container.lastChild);
}
function clearLogs() { vibrate(30); document.getElementById('logContainer').innerHTML = '<div class="log-item" style="color:#a0aec0; justify-content:center;">暂无记录</div>'; }
function saveState() {
if (historyStack.length >= MAX_HISTORY) historyStack.shift();
historyStack.push({
selected: new Set(selectedNumbers),
special: new Set(specialNumbers),
kill: {
redOdd: killRedOdd, redEven: killRedEven,
blueOdd: killBlueOdd, blueEven: killBlueEven,
greenOdd: killGreenOdd, greenEven: killGreenEven,
heads: new Set(killHeads), tails: new Set(killTails), wuxing: new Set(killWuxing)
},
btnMemory: JSON.parse(JSON.stringify(buttonStateMemory)), // Deep copy memory
btnActive: JSON.parse(JSON.stringify(buttonActiveState))
});
futureStack = [];
save_data();
}
function undoAction() {
if (historyStack.length === 0) { showToast("⚠️ 无操作可撤回"); return; }
vibrate([10, 30, 10]);
const currentState = {
selected: new Set(selectedNumbers),
special: new Set(specialNumbers),
kill: {
redOdd: killRedOdd, redEven: killRedEven,
blueOdd: killBlueOdd, blueEven: killBlueEven,
greenOdd: killGreenOdd, greenEven: killGreenEven,
heads: new Set(killHeads), tails: new Set(killTails), wuxing: new Set(killWuxing)
},
btnMemory: JSON.parse(JSON.stringify(buttonStateMemory)),
btnActive: JSON.parse(JSON.stringify(buttonActiveState))
};
futureStack.push(currentState);
restoreState(historyStack.pop());
addLog("undo", "撤回操作");
save_data();
showToast("↩️ 已撤回");
}
function redoAction() {
if (futureStack.length === 0) { showToast("⚠️ 无操作可恢复"); return; }
vibrate([10, 30, 10]);
if (historyStack.length >= MAX_HISTORY) historyStack.shift();
const currentState = {
selected: new Set(selectedNumbers),
special: new Set(specialNumbers),
kill: {
redOdd: killRedOdd, redEven: killRedEven,
blueOdd: killBlueOdd, blueEven: killBlueEven,
greenOdd: killGreenOdd, greenEven: killGreenEven,
heads: new Set(killHeads), tails: new Set(killTails), wuxing: new Set(killWuxing)
},
btnMemory: JSON.parse(JSON.stringify(buttonStateMemory)),
btnActive: JSON.parse(JSON.stringify(buttonActiveState))
};
historyStack.push(currentState);
restoreState(futureStack.pop());
addLog("undo", "恢复操作");
save_data();
showToast("↪️ 已恢复");
}
function restoreState(state) {
selectedNumbers = state.selected;
specialNumbers = state.special || new Set();
if(state.kill) {
killRedOdd = state.kill.redOdd; killRedEven = state.kill.redEven;
killBlueOdd = state.kill.blueOdd; killBlueEven = state.kill.blueEven;
killGreenOdd = state.kill.greenOdd; killGreenEven = state.kill.greenEven;
killHeads = state.kill.heads; killTails = state.kill.tails; killWuxing = state.kill.wuxing || new Set();
}
if(state.btnMemory) buttonStateMemory = state.btnMemory;
if(state.btnActive) buttonActiveState = state.btnActive;
updateAllStates();
document.getElementById('smartInput').value = '';
}
function renderControls() {
const headWuxingContainer = document.getElementById('head-wuxing-controls');
const tailContainer = document.getElementById('tail-controls');
const killHeadWuxingContainer = document.getElementById('kill-head-wuxing-controls');
const killTailContainer = document.getElementById('kill-tail-controls');
const killParityContainer = document.getElementById('kill-parity-controls');
const wuxingLabels = [ { key: 'gold', label: '金' }, { key: 'wood', label: '木' }, { key: 'water', label: '水' }, { key: 'fire', label: '火' }, { key: 'earth', label: '土' } ];
// 选号：头 + 五行
for (let i = 0; i <= 4; i++) {
const btn = document.createElement('button'); btn.className = 'filter-btn'; btn.textContent = i;
btn.id = `head-btn-${i}`;
btn.onclick = () => { vibrate(20); toggleGroupWithMemory(`head-${i}`, i, 'head', true); };
headWuxingContainer.appendChild(btn);
}
wuxingLabels.forEach(item => {
const btn = document.createElement('button'); btn.className = 'filter-btn'; btn.textContent = item.label;
btn.id = `wx-btn-${item.key}`;
btn.onclick = () => { vibrate(20); toggleGroupWithMemory(`wx-${item.key}`, item.key, 'wuxing', true); };
headWuxingContainer.appendChild(btn);
});
// 选号：尾 + 随机特码
for (let i = 0; i <= 9; i++) {
const btn = document.createElement('button'); btn.className = 'filter-btn'; btn.textContent = i;
btn.id = `tail-btn-${i}`;
btn.onclick = () => { vibrate(20); toggleGroupWithMemory(`tail-${i}`, i, 'tail', true); };
tailContainer.appendChild(btn);
}
const randBtn = document.createElement('button');
randBtn.className = 'filter-btn random-btn';
randBtn.textContent = '随机特码';
randBtn.onclick = () => { vibrate(30); pickRandomSpecial(); };
tailContainer.appendChild(randBtn);
// 杀号：头 + 五行
for (let i = 0; i <= 4; i++) {
const btn = document.createElement('button'); btn.className = 'filter-btn'; btn.textContent = i;
btn.id = `k-head-btn-${i}`;
btn.onclick = () => { vibrate(20); toggleGroupWithMemory(`k-head-${i}`, i, 'head', false); };
killHeadWuxingContainer.appendChild(btn);
}
wuxingLabels.forEach(item => {
const btn = document.createElement('button'); btn.className = 'filter-btn'; btn.textContent = item.label;
btn.id = `k-wx-btn-${item.key}`;
btn.onclick = () => { vibrate(20); toggleGroupWithMemory(`k-wx-${item.key}`, item.key, 'wuxing', false); };
killHeadWuxingContainer.appendChild(btn);
});
// 杀号：尾
for (let i = 0; i <= 9; i++) {
const btn = document.createElement('button'); btn.className = 'filter-btn'; btn.textContent = i;
btn.id = `k-tail-btn-${i}`;
btn.onclick = () => { vibrate(20); toggleGroupWithMemory(`k-tail-${i}`, i, 'tail', false); };
killTailContainer.appendChild(btn);
}
// 杀号：波色单双
const labelSpacer = document.createElement('span');
labelSpacer.className = 'row-label kill-label';
labelSpacer.textContent = '波';
killParityContainer.appendChild(labelSpacer);
const createParityBtn = (id, text, type, action) => {
const btn = document.createElement('button');
btn.className = 'filter-btn kill-btn-parity';
btn.textContent = text; btn.id = id;
btn.setAttribute('data-type', type);
btn.onclick = () => { vibrate(20); action(); };
killParityContainer.appendChild(btn);
return btn;
};
// 杀号波色也需要记忆状态，稍微特殊处理
createParityBtn('k-ro', '红单', 'red', () => toggleKillParityWithMemory('redOdd', '红单', 'parity-redOdd'));
createParityBtn('k-re', '红双', 'red', () => toggleKillParityWithMemory('redEven', '红双', 'parity-redEven'));
createParityBtn('k-bo', '蓝单', 'blue', () => toggleKillParityWithMemory('blueOdd', '蓝单', 'parity-blueOdd'));
createParityBtn('k-be', '蓝双', 'blue', () => toggleKillParityWithMemory('blueEven', '蓝双', 'parity-blueEven'));
createParityBtn('k-go', '绿单', 'green', () => toggleKillParityWithMemory('greenOdd', '绿单', 'parity-greenOdd'));
createParityBtn('k-ge', '绿双', 'green', () => toggleKillParityWithMemory('greenEven', '绿双', 'parity-greenEven'));
}
function updateAllStates() {
// 1. 更新号码球视觉
document.querySelectorAll('.num-btn').forEach(btn => {
const num = parseInt(btn.dataset.num);
if(!isNaN(num)) {
const isSelected = selectedNumbers.has(num);
const isSpecial = specialNumbers.has(num);
const isKilled = checkIfKilled(num);
const visuallyActive = isSelected && !isKilled;
btn.classList.toggle('is-active', visuallyActive && !isSpecial);
btn.classList.toggle('is-special', isSpecial && visuallyActive);
}
});
// 2. 更新生肖按钮状态
zodiacs.forEach((z, index) => {
const colNumbers = [];
customGridRows.forEach(row => { if (row[index] !== null) colNumbers.push(row[index]); });
const hasVisibleSelected = colNumbers.some(num => selectedNumbers.has(num) && !checkIfKilled(num));
const btns = document.querySelectorAll(`.zodiac-btn[data-zodiac-index="${index}"]`);
btns.forEach(b => {
if(hasVisibleSelected) b.classList.add('is-active-zodiac');
else b.classList.remove('is-active-zodiac');
});
});
// 3. 更新选号框按钮状态 (基于激活状态，而非实际选中，以反映“模式”)
for(let i=0; i<=4; i++) {
const btn = document.getElementById(`head-btn-${i}`);
if(btn) { if(buttonActiveState[`head-${i}`]) btn.classList.add('active'); else btn.classList.remove('active'); }
}
for(let i=0; i<=9; i++) {
const btn = document.getElementById(`tail-btn-${i}`);
if(btn) { if(buttonActiveState[`tail-${i}`]) btn.classList.add('active'); else btn.classList.remove('active'); }
}
['gold', 'wood', 'water', 'fire', 'earth'].forEach(key => {
const btn = document.getElementById(`wx-btn-${key}`);
if(btn) { if(buttonActiveState[`wx-${key}`]) btn.classList.add('active'); else btn.classList.remove('active'); }
});
// 4. 更新杀号框按钮状态 (基于激活状态)
const setParityBtn = (id, active) => { const btn = document.getElementById(id); if(btn) btn.classList.toggle('active', active); };
setParityBtn('k-ro', killRedOdd); setParityBtn('k-re', killRedEven);
setParityBtn('k-bo', killBlueOdd); setParityBtn('k-be', killBlueEven);
setParityBtn('k-go', killGreenOdd); setParityBtn('k-ge', killGreenEven);
for (let i = 0; i <= 4; i++) {
const kBtn = document.getElementById(`k-head-btn-${i}`); if(kBtn) kBtn.classList.toggle('active', killHeads.has(i));
}
for (let i = 0; i <= 9; i++) {
const kBtn = document.getElementById(`k-tail-btn-${i}`); if(kBtn) kBtn.classList.toggle('active', killTails.has(i));
}
['gold', 'wood', 'water', 'fire', 'earth'].forEach(key => {
const kBtn = document.getElementById(`k-wx-btn-${key}`); if(kBtn) kBtn.classList.toggle('active', killWuxing.has(key));
});
updateResultText();
}
function updateResultText() {
const resultDiv = document.getElementById('resultDisplay');
const countDiv = document.getElementById('countDisplay');
const count = selectedNumbers.size;
countDiv.textContent = count + '个';
if (count === 0) { resultDiv.textContent = "暂无选择"; resultDiv.style.color = "#718096"; return; }
resultDiv.style.color = "#2d3748";
const sorted = Array.from(selectedNumbers).sort((a, b) => a - b);
// 分离普通号和特码
const specials = Array.from(specialNumbers).sort((a, b) => a - b);
const normals = sorted.filter(n => !specialNumbers.has(n));

// 格式化函数
const formatNums = (nums) => nums.map(num => padNum(num)).join('.');

let resultStr = "";
if (normals.length > 0) {
resultStr += formatNums(normals);
}
if (specials.length > 0) {
if (resultStr.length > 0) resultStr += ". ";
resultStr += "特码：" + formatNums(specials);
}

resultDiv.innerText = resultStr;
}
function getColorClass(num) { if (redGroup.has(num)) return 'bg-red'; if (greenGroup.has(num)) return 'bg-green'; if (blueGroup.has(num)) return 'bg-blue'; return ''; }
function padNum(num) { return num < 10 ? '0' + num : '' + num; }
function renderGrid() {
const grid = document.getElementById('grid'); grid.innerHTML = '';
zodiacs.forEach((z, index) => {
const btn = document.createElement('div');
btn.className = `zodiac-btn ${zodiacColors[index % zodiacColors.length]}`;
btn.textContent = z; btn.dataset.zodiacIndex = index;
btn.onclick = () => { vibrate(25); toggleZodiacWithMemory(index); };
grid.appendChild(btn);
});
customGridRows.forEach(row => {
row.forEach(num => {
if (num === null) { const spacer = document.createElement('div'); spacer.style.visibility = 'hidden'; spacer.style.pointerEvents = 'none'; grid.appendChild(spacer); }
else {
const btn = document.createElement('button');
const colorClass = getColorClass(num);
btn.className = `num-btn ${colorClass}`;
const wxType = numToWuxing[num];
const wxChar = wxType ? wuxingChars[wxType] : '';
btn.innerHTML = `<span class="num-val">${padNum(num)}</span><span class="num-wx">${wxChar}</span>`;
btn.dataset.num = num;
btn.onclick = () => { vibrate(25); toggleNumber(num); };
grid.appendChild(btn);
}
});
});
const undoBtn = document.createElement('button');
undoBtn.className = 'action-grid-btn bg-action undo-btn-grid';
undoBtn.innerHTML = '<span class="btn-text">撤销</span>'; undoBtn.onclick = undoAction; grid.appendChild(undoBtn);
for(let i=0; i<10; i++) { const spacer = document.createElement('div'); spacer.style.visibility = 'hidden'; spacer.style.pointerEvents = 'none'; grid.appendChild(spacer); }
const redoBtn = document.createElement('button');
redoBtn.className = 'action-grid-btn bg-action redo-btn-grid';
redoBtn.innerHTML = '<span class="btn-text">恢复</span>'; redoBtn.onclick = redoAction; grid.appendChild(redoBtn);
updateAllStates();
}
function checkIfKilled(num) {
if (killRedOdd && redGroup.has(num) && (num%2!==0)) return true;
if (killRedEven && redGroup.has(num) && (num%2===0)) return true;
if (killBlueOdd && blueGroup.has(num) && (num%2!==0)) return true;
if (killBlueEven && blueGroup.has(num) && (num%2===0)) return true;
if (killGreenOdd && greenGroup.has(num) && (num%2!==0)) return true;
if (killGreenEven && greenGroup.has(num) && (num%2===0)) return true;
if (killHeads.has(Math.floor(num/10))) return true;
if (killTails.has(num%10)) return true;
if (killWuxing.has(numToWuxing[num])) return true;
return false;
}
function toggleNumber(num) {
saveState();
const wasSelected = selectedNumbers.has(num);
if (wasSelected) {
selectedNumbers.delete(num);
specialNumbers.delete(num);
addLog("select", `取消 ${padNum(num)}`);
} else {
selectedNumbers.add(num);
addLog("select", `选中 ${padNum(num)}`);
}
save_data();
updateAllStates();
}
// --- 核心逻辑：带状态记忆的组操作 (强制覆盖模式) ---
function toggleGroupWithMemory(btnId, value, type, isSelectMode) {
const isActive = buttonActiveState[btnId] || false;
const group = getGroupNumbers(type, value);
if (!isActive) {
// --- 激活逻辑 ---
saveState();
// 1. 保存当前整体状态到记忆池
buttonStateMemory[btnId] = new Set(selectedNumbers);
// 2. 执行强制操作
if (isSelectMode) {
// 选号：强制点亮该组所有号码 (不管之前有没有选)
group.forEach(n => selectedNumbers.add(n));
addLog("filter", `启用${getLabel(type, value)}`);
} else {
// 杀号：强制熄灭该组所有号码 (从选中集合移除)
group.forEach(n => selectedNumbers.delete(n));
// 同时设置杀号变量
if (type === 'head') killHeads.add(value);
if (type === 'tail') killTails.add(value);
if (type === 'wuxing') killWuxing.add(value);
addLog("kill", `启用杀${getLabel(type, value)}`);
}
// 3. 更新按钮状态
buttonActiveState[btnId] = true;
} else {
// --- 取消/恢复逻辑 ---
saveState();
// 1. 恢复记忆池中的整体状态
const previousState = buttonStateMemory[btnId];
if (previousState) {
selectedNumbers = new Set(previousState);
// 如果是杀号模式，还需要清除对应的杀号变量，否则恢复后可能又被杀掉
if (!isSelectMode) {
if (type === 'head') killHeads.delete(value);
if (type === 'tail') killTails.delete(value);
if (type === 'wuxing') killWuxing.delete(value);
}
}
// 2. 更新按钮状态
buttonActiveState[btnId] = false;
delete buttonStateMemory[btnId]; // 清除记忆
addLog("filter", `取消${getLabel(type, value)}`);
}
save_data();
updateAllStates();
}
// 杀号波色的特殊处理
function toggleKillParityWithMemory(varName, label, btnId) {
const isActive = buttonActiveState[btnId] || false;
// 获取对应号码组
let group = [];
for(let n=1; n<=49; n++) {
const isOdd = n%2!==0;
if (varName === 'redOdd' && redGroup.has(n) && isOdd) group.push(n);
if (varName === 'redEven' && redGroup.has(n) && !isOdd) group.push(n);
if (varName === 'blueOdd' && blueGroup.has(n) && isOdd) group.push(n);
if (varName === 'blueEven' && blueGroup.has(n) && !isOdd) group.push(n);
if (varName === 'greenOdd' && greenGroup.has(n) && isOdd) group.push(n);
if (varName === 'greenEven' && greenGroup.has(n) && !isOdd) group.push(n);
}
if (!isActive) {
saveState();
buttonStateMemory[btnId] = new Set(selectedNumbers);
// 设置杀号变量
if (varName === 'redOdd') killRedOdd = true;
if (varName === 'redEven') killRedEven = true;
if (varName === 'blueOdd') killBlueOdd = true;
if (varName === 'blueEven') killBlueEven = true;
if (varName === 'greenOdd') killGreenOdd = true;
if (varName === 'greenEven') killGreenEven = true;
// 强制移除对应号码
group.forEach(n => selectedNumbers.delete(n));
buttonActiveState[btnId] = true;
addLog("kill", `启用杀${label}`);
} else {
saveState();
// 恢复变量
if (varName === 'redOdd') killRedOdd = false;
if (varName === 'redEven') killRedEven = false;
if (varName === 'blueOdd') killBlueOdd = false;
if (varName === 'blueEven') killBlueEven = false;
if (varName === 'greenOdd') killGreenOdd = false;
if (varName === 'greenEven') killGreenEven = false;
// 恢复号码状态
const previousState = buttonStateMemory[btnId];
if (previousState) {
selectedNumbers = new Set(previousState);
}
buttonActiveState[btnId] = false;
delete buttonStateMemory[btnId];
addLog("kill", `取消杀${label}`);
}
save_data();
updateAllStates();
}
function toggleZodiacWithMemory(zIndex) {
const btnId = `zodiac-${zIndex}`;
const isActive = buttonActiveState[btnId] || false;
const colNumbers = [];
customGridRows.forEach(row => { if (row[zIndex] !== null) colNumbers.push(row[zIndex]); });
if (!isActive) {
saveState();
buttonStateMemory[btnId] = new Set(selectedNumbers);
colNumbers.forEach(n => selectedNumbers.add(n));
buttonActiveState[btnId] = true;
addLog("select", `生肖选中列 ${zodiacs[zIndex]}`);
} else {
saveState();
const previousState = buttonStateMemory[btnId];
if (previousState) {
selectedNumbers = new Set(previousState);
}
buttonActiveState[btnId] = false;
delete buttonStateMemory[btnId];
addLog("select", `生肖取消列 ${zodiacs[zIndex]}`);
}
save_data();
updateAllStates();
}
function getGroupNumbers(type, value) {
const res = [];
if (type === 'head') { for(let n=1; n<=49; n++) if(Math.floor(n/10) === value) res.push(n); }
if (type === 'tail') { for(let n=1; n<=49; n++) if(n%10 === value) res.push(n); }
if (type === 'wuxing') { res.push(...Array.from(wuxingGroups[value])); }
return res;
}
function getLabel(type, value) {
if (type === 'head') return `${value}头`;
if (type === 'tail') return `${value}尾`;
if (type === 'wuxing') {
const map = {gold:'金', wood:'木', water:'水', fire:'火', earth:'土'};
return map[value];
}
return '';
}
// --- 随机特码滚动逻辑 (累加模式) ---
let rollingInterval = null;
let rollStartTime = 0;
const TOTAL_ROLL_TIME = 5000;
function startRollingHighlight(numbers) {
if (rollingInterval) clearInterval(rollingInterval);
document.querySelectorAll('.num-btn.gold-highlight').forEach(btn => {
btn.classList.remove('gold-highlight');
});
rollStartTime = Date.now();
let currentIndex = 0;
const runStep = () => {
const elapsed = Date.now() - rollStartTime;
const progress = Math.min(elapsed / TOTAL_ROLL_TIME, 1);
const currentSpeed = 50 + (550 * Math.pow(progress, 3));
currentIndex = (currentIndex + 1) % numbers.length;
const prevIndex = (currentIndex - 1 + numbers.length) % numbers.length;
const prevBtn = document.querySelector(`.num-btn[data-num="${numbers[prevIndex]}"]`);
if (prevBtn) prevBtn.classList.remove('gold-highlight');
const currBtn = document.querySelector(`.num-btn[data-num="${numbers[currentIndex]}"]`);
if (currBtn) currBtn.classList.add('gold-highlight');
if (elapsed < TOTAL_ROLL_TIME) {
rollingInterval = setTimeout(runStep, currentSpeed);
} else {
finishRolling(numbers[currentIndex]);
}
};
runStep();
}
function finishRolling(finalNumber) {
clearInterval(rollingInterval);
rollingInterval = null;
document.querySelectorAll('.num-btn.gold-highlight').forEach(btn => {
btn.classList.remove('gold-highlight');
});
specialNumbers.add(finalNumber);
if(!selectedNumbers.has(finalNumber)) {
selectedNumbers.add(finalNumber);
}
save_data();
updateAllStates();
addLog("input", `新增特码 ${padNum(finalNumber)}`);
showToast(`🎉 特码：${padNum(finalNumber)}`);
vibrate([50, 50, 50]);
}
function pickRandomSpecial() {
const allActive = Array.from(selectedNumbers);
if (allActive.length === 0) {
showToast("⚠️ 请先点亮至少一个号码");
return;
}
let candidates = allActive.filter(n => !specialNumbers.has(n));
if (candidates.length === 0) {
showToast("⚠️ 当前选中的号码均为特码，请多选一些号码");
return;
}
startRollingHighlight(candidates);
}
function copyResult() {
const text = document.getElementById('resultDisplay').innerText;
if (text.includes("暂无选择")) { showToast("无内容"); return; }
vibrate([30, 50, 30]);
navigator.clipboard.writeText(text).then(() => { showToast("✅ 已复制"); addLog("system", "复制"); }).catch(() => {
const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select();
document.execCommand('copy'); document.body.removeChild(ta); showToast("✅ 已复制");
});
}
function clearData() {
if(confirm("确定清空？")) {
if (rollingInterval) { clearTimeout(rollingInterval); rollingInterval = null; }
vibrate([50, 50, 50]); saveState();
selectedNumbers.clear(); specialNumbers.clear();
buttonStateMemory = {};
buttonActiveState = {};
killRedOdd = false; killRedEven = false; killBlueOdd = false; killBlueEven = false; killGreenOdd = false; killGreenEven = false;
killHeads.clear(); killTails.clear(); killWuxing.clear(); futureStack = [];
document.getElementById('smartInput').value = '';
save_data(); updateAllStates();
showToast("🗑️ 已清空"); addLog("clear", "清空全部");
}
}
function setToArray(set) { return Array.from(set); }
function arrayToSet(arr) { return new Set(arr || []); }
function serializeHistory(stack) {
return stack.map(state => ({
selected: setToArray(state.selected),
special: setToArray(state.special),
kill: state.kill,
btnMemory: state.btnMemory, // Serialize memory
btnActive: state.btnActive
}));
}
function deserializeHistory(serializedStack) {
if (!serializedStack) return [];
return serializedStack.map(item => ({
selected: arrayToSet(item.selected),
special: arrayToSet(item.special),
kill: item.kill,
btnMemory: item.btnMemory,
btnActive: item.btnActive
})).map(stateObj => {
// Convert inner sets in btnMemory back to Sets if needed, but JSON stringify turned them into arrays?
// No, in saveState we did JSON.parse(JSON.stringify(...)), so they are objects/arrays.
// In restoreState we need to reconstruct Sets.
if(stateObj.btnMemory) {
const restoredMem = {};
for(const k in stateObj.btnMemory) {
restoredMem[k] = new Set(stateObj.btnMemory[k]);
}
stateObj.btnMemory = restoredMem;
}
return stateObj;
});
}
function restoreState(state) {
selectedNumbers = state.selected;
specialNumbers = state.special || new Set();
if(state.kill) {
killRedOdd = state.kill.redOdd; killRedEven = state.kill.redEven;
killBlueOdd = state.kill.blueOdd; killBlueEven = state.kill.blueEven;
killGreenOdd = state.kill.greenOdd; killGreenEven = state.kill.greenEven;
killHeads = arrayToSet(state.kill.heads); killTails = arrayToSet(state.kill.tails); killWuxing = arrayToSet(state.kill.wuxing);
}
if(state.btnMemory) buttonStateMemory = state.btnMemory;
if(state.btnActive) buttonActiveState = state.btnActive;
updateAllStates();
document.getElementById('smartInput').value = '';
}
function save_data() {
// Convert Sets in memory to Arrays for JSON
const serializableMem = {};
for(const k in buttonStateMemory) {
serializableMem[k] = Array.from(buttonStateMemory[k]);
}
const data = {
selected: setToArray(selectedNumbers),
special: setToArray(specialNumbers),
kill: {
redOdd: killRedOdd, redEven: killRedEven,
blueOdd: killBlueOdd, blueEven: killBlueEven,
greenOdd: killGreenOdd, greenEven: killGreenEven,
heads: setToArray(killHeads), tails: setToArray(killTails), wuxing: setToArray(killWuxing)
},
btnMemory: serializableMem,
btnActive: buttonActiveState,
history: serializeHistory(historyStack),
future: serializeHistory(futureStack)
};
localStorage.setItem('lucky666_data_v7', JSON.stringify(data));
}
function load_data() {
let raw = localStorage.getItem('lucky666_data_v7');
if (!raw) {
raw = localStorage.getItem('lucky666_data_v6');
if(raw) {
// Migrate old data, reset memory
selectedNumbers = arrayToSet(JSON.parse(raw).selected || []);
specialNumbers = new Set();
buttonStateMemory = {};
buttonActiveState = {};
save_data(); return;
}
return;
}
try {
const d = JSON.parse(raw);
selectedNumbers = arrayToSet(d.selected);
specialNumbers = arrayToSet(d.special);
if(d.kill) {
killRedOdd = d.kill.redOdd; killRedEven = d.kill.redEven;
killBlueOdd = d.kill.blueOdd; killBlueEven = d.kill.blueEven;
killGreenOdd = d.kill.greenOdd; killGreenEven = d.kill.greenEven;
killHeads = arrayToSet(d.kill.heads); killTails = arrayToSet(d.kill.tails); killWuxing = arrayToSet(d.kill.wuxing);
}
if(d.btnMemory) {
const restoredMem = {};
for(const k in d.btnMemory) {
restoredMem[k] = new Set(d.btnMemory[k]);
}
buttonStateMemory = restoredMem;
}
if(d.btnActive) buttonActiveState = d.btnActive;
historyStack = deserializeHistory(d.history);
futureStack = deserializeHistory(d.future);
} catch(e) { console.error("数据加载失败", e); }
}
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
init();
</script>
