killParityContainer.appendChild(btn);
return btn;
};
createParityBtn('k-ro', '红单', 'red', 'odd');
createParityBtn('k-re', '红双', 'red', 'even');
createParityBtn('k-bo', '蓝单', 'blue', 'odd');
createParityBtn('k-be', '蓝双', 'blue', 'even');
createParityBtn('k-go', '绿单', 'green', 'odd');
createParityBtn('k-ge', '绿双', 'green', 'even');
for (let i = 0; i <= 9; i++) {
const btn = document.createElement('button');
btn.className = 'filter-btn';
btn.textContent = i;
btn.dataset.type = 'tail';
btn.dataset.value = i.toString();
btn.onclick = function() { toggleKillGroup(this, 'tail', this.dataset.value); };
killTailContainer.appendChild(btn);
}
}
function updateAllStates(refreshButtons = true) {
document.querySelectorAll('.num-btn').forEach(btn => {
const num = parseInt(btn.dataset.num);
if(!isNaN(num)) {
const isSelected = selectedNumbers.has(num);
const isSpecial = specialNumbersSet.has(num);
btn.classList.toggle('is-active', isSelected);
if (isSpecial && isSelected) {
btn.classList.add('is-special');
} else {
btn.classList.remove('is-special');
}
}
});
if (refreshButtons) {
zodiacs.forEach((z, index) => {
const colNumbers = [];
customGridRows.forEach(row => { if (row[index] !== null) colNumbers.push(row[index]); });
const anySelected = colNumbers.some(num => selectedNumbers.has(num));
const btns = document.querySelectorAll(`.zodiac-btn[data-zodiac-index="${index}"]`);
btns.forEach(b => {
if (anySelected) {
if (!b.classList.contains('is-active-zodiac')) b.classList.add('is-active-zodiac');
} else {
if (b.classList.contains('is-active-zodiac')) b.classList.remove('is-active-zodiac');
}
});
});
// 更新选号区普通按钮 (头/尾/五行)
document.querySelectorAll('#head-wuxing-controls .filter-btn, #tail-controls .filter-btn').forEach(btn => {
const type = btn.dataset.type;
const value = btn.dataset.value;
const groupNums = getGroupNumbers(type, value);
if (groupNums.length === 0) return;
const allSelected = groupNums.every(n => selectedNumbers.has(n));
const isCurrentlyActive = btn.classList.contains('active');
if (allSelected) {
if (!isCurrentlyActive) btn.classList.add('active');
} else {
if (isCurrentlyActive) btn.classList.remove('active');
}
});
// 更新选号区波色按钮状态
document.querySelectorAll('#select-parity-controls .filter-btn').forEach(btn => {
const type = btn.dataset.type;
const value = btn.dataset.value;
const groupNums = getGroupNumbers(type, value);
if (groupNums.length === 0) return;
const allSelected = groupNums.every(n => selectedNumbers.has(n));
const isCurrentlyActive = btn.classList.contains('active');
if (allSelected) {
if (!isCurrentlyActive) btn.classList.add('active');
} else {
if (isCurrentlyActive) btn.classList.remove('active');
}
});

// 更新杀号区按钮
document.querySelectorAll('#kill-head-wuxing-controls .filter-btn, #kill-tail-controls .filter-btn, #kill-parity-controls .filter-btn').forEach(btn => {
const type = btn.dataset.type;
const value = btn.dataset.value;
const groupNums = getGroupNumbers(type, value);
if (groupNums.length === 0) return;
const allKilled = !groupNums.some(n => selectedNumbers.has(n));
const isCurrentlyActive = btn.classList.contains('active');
if (allKilled) {
if (!isCurrentlyActive) btn.classList.add('active');
} else {
if (isCurrentlyActive) btn.classList.remove('active');
}
});
}
updateResultText();
}
function updateResultText() {
const resultDiv = document.getElementById('resultDisplay'), countDiv = document.getElementById('countDisplay'), count = selectedNumbers.size;
countDiv.textContent = count + '个';
if (count === 0) {
resultDiv.textContent = "暂无选择";
resultDiv.style.color = "#718096";
return;
}
resultDiv.style.color = "#2d3748";
const allSelected = Array.from(selectedNumbers).sort((a, b) => a - b);
const specialOnly = allSelected.filter(n => specialNumbersSet.has(n));
const normalOnly = allSelected.filter(n => !specialNumbersSet.has(n));
let text = "";
if (normalOnly.length > 0) {
text += normalOnly.map(num => fmtNum(num)).join('.');
}
if (specialOnly.length > 0) {
if (text.length > 0) text += "，";
text += "特码：" + specialOnly.map(num => fmtNum(num)).join('.');
} else if (normalOnly.length === 0) {
text = "暂无选择";
}
resultDiv.innerText = text;
}
function getColorClass(num) {
if (redGroup.has(num)) return 'bg-red';
if (greenGroup.has(num)) return 'bg-green';
if (blueGroup.has(num)) return 'bg-blue';
return '';
}
function renderGrid() {
const grid = document.getElementById('grid'); grid.innerHTML = '';
zodiacs.forEach((z, index) => {
const btn = document.createElement('div');
btn.className = `zodiac-btn`;
btn.setAttribute('data-color', zodiacColors[index % zodiacColors.length]);
btn.textContent = z;
btn.dataset.zodiacIndex = index;
btn.onclick = () => {
vibrate(20);
toggleSelectGroup(btn, 'zodiac', index.toString());
};
grid.appendChild(btn);
});
customGridRows.forEach(row => {
row.forEach(num => {
if (num === null) {
const spacer = document.createElement('div');
spacer.style.visibility = 'hidden';
spacer.style.pointerEvents = 'none';
grid.appendChild(spacer);
} else {
const btn = document.createElement('button');
const colorClass = getColorClass(num);
btn.className = `num-btn ${colorClass}`;
const wxType = numToWuxing[num];
const wxChar = wxType ? wuxingChars[wxType] : '';
btn.innerHTML = `<span class="num-val">${fmtNum(num)}</span><span class="num-wx">${wxChar}</span>`;
btn.dataset.num = num;
btn.onclick = () => { vibrate(25); toggleNumber(num); };
grid.appendChild(btn);
}
});
});
const undoBtn = document.createElement('button');
undoBtn.className = 'action-grid-btn bg-action undo-btn-grid';
undoBtn.innerHTML = '<span class="btn-text">撤销</span>';
undoBtn.onclick = undoAction;
grid.appendChild(undoBtn);
const randomBtn = document.createElement('button');
randomBtn.className = 'action-grid-btn random-btn-grid random-btn-style';
randomBtn.innerHTML = '<span class="btn-text">随机特码</span>';
randomBtn.onclick = randomSpecialNumber;
grid.appendChild(randomBtn);
const redoBtn = document.createElement('button');
redoBtn.className = 'action-grid-btn bg-action redo-btn-grid';
redoBtn.innerHTML = '<span class="btn-text">恢复</span>';
redoBtn.onclick = redoAction;
grid.appendChild(redoBtn);
updateAllStates();
}
function toggleNumber(num) {
const wasSelected = selectedNumbers.has(num);
const numStr = fmtNum(num);
const actionDesc = wasSelected ? `取消选中 ${numStr}` : `选中 ${numStr}`;
saveState(actionDesc);
if (wasSelected) {
selectedNumbers.delete(num);
manuallySelected.delete(num);
specialNumbersSet.delete(num);
addLog("select", actionDesc);
} else {
selectedNumbers.add(num);
manuallySelected.add(num);
addLog("select", actionDesc);
}
save_data();
updateAllStates(true);
}
function copyResult() {
const text = document.getElementById('resultDisplay').innerText;
if (text.includes("暂无选择")) { showToast("无内容"); return; }
vibrate([30, 50, 30]);
navigator.clipboard.writeText(text).then(() => {
showToast("✅ 已复制"); addLog("system", "复制");
}).catch(() => {
const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast("✅ 已复制");
});
}
function clearData() {
if(confirm("确定清空？")) {
vibrate([50, 50, 50]);
saveState("清空全部");
selectedNumbers.clear();
manuallySelected.clear();
specialNumbersSet.clear();
futureStack = [];
document.getElementById('smartInput').value = '';
save_data();
updateAllStates(true);
showToast("🗑️ 已清空");
addLog("clear", "清空全部");
}
}
function setToArray(set) { return Array.from(set); }
function arrayToSet(arr) { return new Set(arr || []); }
function serializeHistory(stack) { return stack.map(state => ({ selected: setToArray(state.selected), manual: setToArray(state.manual), special: setToArray(state.special), desc: state.desc })); }
function deserializeHistory(serializedStack) { if (!serializedStack) return []; return serializedStack.map(item => ({ selected: arrayToSet(item.selected), manual: arrayToSet(item.manual), special: arrayToSet(item.special), desc: item.desc })); }
function save_data() {
const data = {
selected: setToArray(selectedNumbers),
manual: setToArray(manuallySelected),
special: setToArray(specialNumbersSet),
history: serializeHistory(historyStack),
future: serializeHistory(futureStack)
};
localStorage.setItem('lucky666_data_v10', JSON.stringify(data));
}
function load_data() {
let raw = localStorage.getItem('lucky666_data_v10');
if (!raw) {
raw = localStorage.getItem('lucky666_data_v9');
if (raw) {
try {
const d = JSON.parse(raw);
selectedNumbers = arrayToSet(d.selected);
manuallySelected = arrayToSet(d.manual);
specialNumbersSet = arrayToSet(d.special);
historyStack = [];
futureStack = [];
save_data();
return;
} catch(e) {}
}
return;
}
try {
const d = JSON.parse(raw);
selectedNumbers = arrayToSet(d.selected);
manuallySelected = arrayToSet(d.manual);
specialNumbersSet = arrayToSet(d.special);
historyStack = deserializeHistory(d.history);
futureStack = deserializeHistory(d.future);
} catch(e) {}
}
// 修改 showToast 以支持自定义时长
function showToast(msg, duration = 3000) {
const t = document.getElementById('toast');
t.textContent = msg;
t.classList.add('show');
setTimeout(() => t.classList.remove('show'), duration);
}
init();
</script>
