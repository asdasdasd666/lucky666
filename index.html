<script>
function generateIconSvg(text) {
const svgContent = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="22" fill="#D90429"/><text x="50" y="68" font-family="'ZCOOL XiaoWei', serif" font-size="56" font-weight="900" fill="white" text-anchor="middle" style="filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.4));">${text}</text></svg>`;
return 'data:image/svg+xml,' + encodeURIComponent(svgContent);
}
const iconUrl = generateIconSvg("");
document.getElementById('dynamic-favicon').setAttribute('href', iconUrl);
document.getElementById('dynamic-app-icon').setAttribute('href', iconUrl);
const zodiacs = ["鼠", "牛", "虎", "兔", "龙", "蛇", "马", "羊", "猴", "鸡", "狗", "猪"];
const zodiacColors = ['red', 'blue', 'green', 'red', 'blue', 'green', 'red', 'blue', 'green', 'red', 'blue', 'green'];
const redGroup = new Set([7, 2, 1, 12, 8, 19, 18, 13, 24, 23, 30, 29, 35, 34, 40, 46, 45]);
const greenGroup = new Set([6, 5, 11, 17, 16, 22, 21, 28, 27, 33, 32, 43, 39, 38, 44, 49]);
const blueGroup = new Set([4, 3, 10, 9, 15, 14, 20, 31, 26, 25, 36, 42, 41, 37, 48, 47]);
const wuxingGroups = { gold: new Set([5, 4, 12, 13, 27, 26, 35, 34, 42, 43]), wood: new Set([9, 8, 24, 16, 17, 25, 46, 47, 38, 39]), water: new Set([1, 22, 23, 14, 15, 30, 31, 45, 44]), fire: new Set([3, 2, 11, 10, 18, 19, 33, 32, 48, 49, 40, 41]), earth: new Set([7, 6, 20, 21, 28, 29, 36, 37]) };
const numToWuxing = {};
const wuxingChars = { gold: '金', wood: '木', water: '水', fire: '火', earth: '土' };
for (const [type, nums] of Object.entries(wuxingGroups)) nums.forEach(n => numToWuxing[n] = type);
const customGridRows = [[7, 6, 5, 4, 3, 2, 1, 12, 11, 10, 9, 8], [19, 18, 17, 16, 15, 14, 13, 24, 23, 22, 21, 20], [31, 30, 29, 28, 27, 26, 25, 36, 35, 34, 33, 32], [43, 42, 41, 40, 39, 38, 37, 48, 47, 46, 45, 44], [null, null, null, null, null, null, 49, null, null, null, null, null]];
let selectedNumbers = new Set();
let bettingNumbers = new Set();
let betResults = {};
let undoStack = [];
let redoStack = [];
let inputHistory = [];
let tempStorageData = [];
let isRandomRunning = false;
let specialNumbersSet = new Set();
let currentHighlightedNumber = null;
let manuallyTurnedOff = new Set();
let lastInputValue = '';

const ZODIAC_MAP = { "鼠":0, "牛":1, "虎":2, "兔":3, "龙":4, "蛇":5, "马":6, "羊":7, "猴":8, "鸡":9, "狗":10, "猪":11, "免":3 };

const freqColorPalette = [
    "linear-gradient(145deg, #FF7F50, #FF6347)",
    "linear-gradient(145deg, #CD5C5C, #B22222)",
    "linear-gradient(145deg, #FFB6C1, #FF69B4)",
    "linear-gradient(145deg, #7FFF00, #32CD32)",
    "linear-gradient(145deg, #6495ED, #4169E1)",
    "linear-gradient(145deg, #00BFFF, #1E90FF)",
    "linear-gradient(145deg, #ADD8E6, #87CEEB)",
    "linear-gradient(145deg, #DDA0DD, #BA55D3)",
    "linear-gradient(145deg, #40E0D0, #20B2AA)",
    "linear-gradient(145deg, #7FFFD4, #66CDAA)"
];

let globalFreqColorMap = new Map();

let selectedImageFile = null;
let lastImageFileData = null;

function compressImage(file, callback) {
    const reader = new FileReader();
    reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            let width = img.width;
            let height = img.height;
            if (width > 800) {
                height = (height * 800) / width;
                width = 800;
            }
            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);
            canvas.toBlob(callback, 'image/jpeg', 0.9);
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

function clearImagePreview() {
    selectedImageFile = null;
    document.getElementById('imageUpload').value = '';
    document.getElementById('imagePreview').style.display = 'none';
    document.getElementById('ocrStatus').textContent = '';
    const progressText = document.getElementById('ocrProgressText');
    if (progressText) progressText.textContent = '';
    updateOCRButtonState();
}

function updateOCRButtonState() {
    const ocrBtn = document.getElementById('ocrBtn');
    if (!selectedImageFile) {
        ocrBtn.disabled = true;
        ocrBtn.textContent = '识别';
    } else {
        ocrBtn.disabled = false;
        ocrBtn.textContent = '识别';
    }
}

function restoreImagePreview(file) {
    if (!file) {
        clearImagePreview();
        return;
    }
    selectedImageFile = file;
    const reader = new FileReader();
    reader.onload = function(event) {
        const preview = document.getElementById('imagePreview');
        const img = document.getElementById('previewImg');
        img.src = event.target.result;
        preview.style.display = 'inline-block';
        document.getElementById('ocrStatus').textContent = '已选择图片，点击识别';
        const progressText = document.getElementById('ocrProgressText');
        if (progressText) progressText.textContent = '';
        updateOCRButtonState();
    };
    reader.readAsDataURL(file);
}

document.getElementById('imageUpload').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    const prevImageFile = selectedImageFile;
    recordAction('image_select', '选择图片', [], true, 0, {
        prevImageFile: prevImageFile,
        newImageFile: file
    });
    
    selectedImageFile = file;
    const reader = new FileReader();
    reader.onload = function(event) {
        const preview = document.getElementById('imagePreview');
        const img = document.getElementById('previewImg');
        img.src = event.target.result;
        preview.style.display = 'inline-block';
        document.getElementById('ocrStatus').textContent = '已选择图片，点击识别';
        const progressText = document.getElementById('ocrProgressText');
        if (progressText) progressText.textContent = '';
        updateOCRButtonState();
    };
    reader.readAsDataURL(file);
});

function applyBinarization(canvas) {
    const ctx = canvas.getContext('2d');
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    for (let i = 0; i < data.length; i += 4) {
        const r = data[i];
        const g = data[i+1];
        const b = data[i+2];
        const gray = 0.299 * r + 0.587 * g + 0.114 * b;
        const threshold = 160;
        const binary = gray > threshold ? 255 : 0;
        data[i] = binary;
        data[i+1] = binary;
        data[i+2] = binary;
    }
    ctx.putImageData(imageData, 0, 0);
}

function ensureFreqColors() {
    const freqMap = calculateNumberFrequencies();
    const allFreqs = new Set();
    for (let i = 1; i <= 49; i++) {
        const freq = freqMap[i] || 0;
        if (freq > 1) allFreqs.add(freq);
    }
    
    const needColorFreqs = Array.from(allFreqs).filter(f => !globalFreqColorMap.has(f));
    if (needColorFreqs.length === 0) return;
    
    let availableColors = [...freqColorPalette];
    for (let i = availableColors.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [availableColors[i], availableColors[j]] = [availableColors[j], availableColors[i]];
    }
    
    let colorIndex = 0;
    for (const freq of needColorFreqs) {
        if (colorIndex >= availableColors.length) {
            availableColors = [...freqColorPalette];
            for (let j = availableColors.length - 1; j > 0; j--) {
                const k = Math.floor(Math.random() * (j + 1));
                [availableColors[j], availableColors[k]] = [availableColors[k], availableColors[j]];
            }
            colorIndex = 0;
        }
        globalFreqColorMap.set(freq, availableColors[colorIndex]);
        colorIndex++;
    }
}

async function performOCR() {
    if (!selectedImageFile) {
        showToast("⚠️ 请先选择图片");
        return;
    }
    const ocrBtn = document.getElementById('ocrBtn');
    const statusSpan = document.getElementById('ocrStatus');
    const progressTextSpan = document.getElementById('ocrProgressText');
    
    ocrBtn.disabled = true;
    statusSpan.textContent = '压缩图片中...';
    progressTextSpan.innerHTML = '<span class="progress-label">识别中</span><span class="progress-bar-text"></span><span class="progress-percent">0%</span>';
    showToast("🔍 正在处理图片，请稍候...");
    
    const startTime = Date.now();
    
    try {
        compressImage(selectedImageFile, async function(compressedBlob) {
            statusSpan.textContent = '二值化处理中...';
            
            const imgForBinarize = new Image();
            const imgUrl = URL.createObjectURL(compressedBlob);
            imgForBinarize.onload = async function() {
                const canvas = document.createElement('canvas');
                canvas.width = imgForBinarize.width;
                canvas.height = imgForBinarize.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(imgForBinarize, 0, 0);
                applyBinarization(canvas);
                
                URL.revokeObjectURL(imgUrl);
                
                canvas.toBlob(async function(binarizedBlob) {
                    statusSpan.textContent = '识别中';
                    const worker = await Tesseract.createWorker('chi_sim+eng');
                    
                    worker.progress = (p) => {
                        const percent = Math.round(p.progress * 100);
                        const barLength = Math.floor(percent / 5);
                        const bar = '='.repeat(barLength);
                        progressTextSpan.innerHTML = `<span class="progress-label">识别中</span><span class="progress-bar-text">${bar}</span><span class="progress-percent">${percent}%</span>`;
                        statusSpan.textContent = `识别中 ${percent}%`;
                    };
                    
                    const ret = await worker.recognize(binarizedBlob);
                    await worker.terminate();
                    
                    let text = ret.data.text;
                    
                    // 预处理：将空格替换为 .，合并多个空格
                    text = text.replace(/\s+/g, '.');
                    
                    const zodiacList = ["鼠","牛","虎","兔","龙","蛇","马","羊","猴","鸡","狗","猪"];
                    const numbers = [];
                    const zodiacMatches = [];
                    
                    const numMatches = text.match(/\d+/g);
                    if (numMatches) {
                        numMatches.forEach(m => {
                            let n = parseInt(m, 10);
                            if (n >= 1 && n <= 49 && !numbers.includes(n)) {
                                numbers.push(n);
                            }
                        });
                    }
                    
                    for (let z of zodiacList) {
                        if (text.includes(z) && !zodiacMatches.includes(z)) {
                            zodiacMatches.push(z);
                        }
                    }
                    
                    let inputText = '';
                    if (numbers.length > 0) {
                        inputText += numbers.join(' ');
                    }
                    if (zodiacMatches.length > 0) {
                        if (inputText) inputText += ' ';
                        inputText += zodiacMatches.join('');
                    }
                    
                    const allValidNumbers = new Set();
                    numbers.forEach(n => allValidNumbers.add(n));
                    zodiacMatches.forEach(z => {
                        const index = ZODIAC_MAP[z];
                        const nums = getGroupNumbers('zodiac', index.toString());
                        nums.forEach(n => allValidNumbers.add(n));
                    });
                    const finalCount = allValidNumbers.size;
                    
                    // 构建完成提示
                    let completeMsg = '';
                    if (numbers.length > 0 && zodiacMatches.length > 0) {
                        completeMsg = `识别完成，共 ${finalCount} 个号码和 ${zodiacMatches.length} 肖`;
                    } else if (numbers.length > 0) {
                        completeMsg = `识别完成，共 ${finalCount} 个号码`;
                    } else if (zodiacMatches.length > 0) {
                        completeMsg = `识别完成，共 ${zodiacMatches.length} 肖`;
                    } else {
                        completeMsg = "未识别到生肖或1-49的数字";
                    }
                    
                    // 确保进度条至少显示1秒
                    const elapsed = Date.now() - startTime;
                    const remaining = Math.max(0, 1000 - elapsed);
                    
                    setTimeout(() => {
                        statusSpan.textContent = completeMsg;
                        progressTextSpan.innerHTML = '';
                        ocrBtn.disabled = false;
                        updateOCRButtonState();
                    }, remaining);
                    
                    if (inputText) {
                        setTimeout(() => {
                            document.getElementById('smartInput').value = inputText;
                            lastInputValue = inputText;
                        }, remaining);
                        setTimeout(() => {
                            showToast(`📝 ${completeMsg}`);
                        }, remaining + 100);
                    } else {
                        setTimeout(() => {
                            showToast("⚠️ 未识别到生肖或1-49的数字");
                        }, remaining + 100);
                    }
                    
                }, 'image/jpeg', 0.9);

function processInputAndAddToHistory(text) {
const digitMatches = text.match(/\d+/g);
const validNumbers = [];
const originalOrderNumbers = [];
let digitCount = 0;
if (digitMatches) {
digitMatches.forEach(m => {
let n = parseInt(m, 10);
if (n >= 1 && n <= 49) {
if (!validNumbers.includes(n)) validNumbers.push(n);
originalOrderNumbers.push(n);
digitCount++;
}
});
}
let zodiacCount = 0;
let foundZodiacs = new Set();
for (let char of text) {
if (ZODIAC_MAP.hasOwnProperty(char)) {
if (!foundZodiacs.has(char)) {
foundZodiacs.add(char);
zodiacCount++;
}
const index = ZODIAC_MAP[char];
const nums = getGroupNumbers('zodiac', index.toString());
nums.forEach(n => {
if (!validNumbers.includes(n)) {
validNumbers.push(n);
originalOrderNumbers.push(n);
}
});
}
}
if (validNumbers.length > 0) {
let changed = false;
const newNums = [];
const alreadySelectedNums = [];
validNumbers.forEach(n => {
if (selectedNumbers.has(n)) { alreadySelectedNums.push(n); }
else { selectedNumbers.add(n); manuallyTurnedOff.delete(n); changed = true; newNums.push(n); const btn = document.querySelector(`.num-btn[data-num="${n}"]`); if (btn) btn.classList.add('is-active'); }
});
const sortedNums = [...validNumbers].sort((a,b) => a-b);
let labelPrefix = "";
let isPureZodiac = false;
if (digitCount === 0 && zodiacCount > 0) {
    labelPrefix = `${zodiacCount}肖`;
    isPureZodiac = true;
} else {
    labelPrefix = `${validNumbers.length}码`;
    isPureZodiac = false;
}
inputHistory.push({
id: Date.now(),
rawText: text,
numbers: originalOrderNumbers,
sortedNumbers: sortedNums,
labelPrefix: labelPrefix,
isPureZodiac: isPureZodiac
});
if (changed) {
if (newNums.length === 1) { recordAction('single', fmtNum(newNums[0]), newNums, true); }
else { recordAction('batch_input', `${newNums.length}个号码`, newNums, true); }
updateAllStates();
addLog("input", `批量选中 ${validNumbers.length} 个号`);
vibrate(30);
let msg = `✅ 已点亮 ${newNums.map(fmtNum).join('.')}`;
if (alreadySelectedNums.length > 0) { msg += ` (${alreadySelectedNums.map(fmtNum).join('.')}) 已被选中`; }
showToast(msg);
} else {
updateAllStates();
showToast(`ℹ️ 这些号码 (${validNumbers.map(fmtNum).join('.')}) 已选中`);
}
} else {
showToast("⚠️ 无有效号码 (1-49) 或生肖");
}
}

html += `<div class="temp-storage-row"><span class="temp-storage-label">双号:</span> ${parts.join('')}</div>`;
}
container.innerHTML = html;
}
function updateTempCountBadge() {
const badge = document.getElementById('tempCountBadge');
if(!badge) return;
badge.textContent = tempStorageData.length + '个';
}
function updateTempStoreBtn() {
const btn = document.getElementById('tempStoreBtn');
if(!btn) return;
const selectedArr = Array.from(selectedNumbers);
if (selectedArr.length === 0) {
btn.className = 'temp-action-btn grey';
btn.textContent = '无号码';
btn.style.opacity = '0.5';
btn.style.cursor = 'not-allowed';
btn.style.backgroundColor = '#cbd5e0';
btn.style.color = '#718096';
btn.style.boxShadow = 'none';
btn.onclick = function() {};
return;
}
const existingNums = new Set(tempStorageData.map(i => i.num));
const newNums = selectedArr.filter(n => !existingNums.has(n));
const allExist = newNums.length === 0;
if (allExist) {
btn.className = 'temp-action-btn grey';
btn.textContent = '已暂存';
btn.style.opacity = '0.5';
btn.style.cursor = 'not-allowed';
btn.style.backgroundColor = '#cbd5e0';
btn.style.color = '#718096';
btn.style.boxShadow = 'none';
btn.onclick = function() {};
} else {
btn.className = 'temp-action-btn green';
if (tempStorageData.length === 0) {
btn.textContent = '暂存';
} else {
btn.textContent = '继续暂存';
}
btn.style.opacity = '';
btn.style.cursor = '';
btn.style.backgroundColor = '';
btn.style.color = '';
btn.style.boxShadow = '';
btn.onclick = handleTempStore;
}
}
function updateTempRestoreBtn() {
const btn = document.getElementById('tempRestoreBtn');
if(!btn) return;
if (tempStorageData.length === 0) {
btn.className = 'temp-action-btn grey';
btn.textContent = '无号码';
btn.style.opacity = '0.5';
btn.style.cursor = 'not-allowed';
btn.style.backgroundColor = '#cbd5e0';
btn.style.color = '#718096';
btn.style.boxShadow = 'none';
btn.onclick = function() {};
} else {
btn.className = 'temp-action-btn green';
btn.textContent = '恢复';
btn.style.opacity = '';
btn.style.cursor = '';
btn.style.backgroundColor = '';
btn.style.color = '';
btn.style.boxShadow = '';
btn.onclick = handleTempRestore;
}
}
function updateTempClearBtn() {
const btn = document.getElementById('tempClearBtn');
if(!btn) return;
if (tempStorageData.length === 0) {
btn.className = 'temp-action-btn grey';
btn.textContent = '清空暂存';
btn.style.opacity = '0.5';
btn.style.cursor = 'not-allowed';
btn.style.backgroundColor = '#cbd5e0';
btn.style.color = '#718096';
btn.style.boxShadow = 'none';
btn.onclick = function() {};
} else {
btn.className = 'temp-action-btn orange';
btn.textContent = '清空暂存';
btn.style.opacity = '';
btn.style.cursor = '';
btn.style.backgroundColor = '';
btn.style.color = '';
btn.style.boxShadow = '';
btn.onclick = handleTempClear;
}
}
function handleTempStore() {
const selectedArr = Array.from(selectedNumbers);
if (selectedArr.length === 0) {
return;
}
const existingNums = new Set(tempStorageData.map(i => i.num));
const newNums = selectedArr.filter(n => !existingNums.has(n));
if (newNums.length === 0) {
showToast("ℹ️ 所有号码已暂存");
return;
}
if (!confirm(`是否添加 ${newNums.length} 个新号码到暂存区？`)) return;
const prevTempData = [...tempStorageData];
newNums.forEach(n => {
tempStorageData.push({ 
    num: n, 
    isSpecial: specialNumbersSet.has(n),
    isBetting: bettingNumbers.has(n)
});
});
tempStorageData.sort((a, b) => a.num - b.num);
recordAction('temp_store', '暂存号码', [], true, 0, {
addedNums: newNums,
prevTempData: prevTempData
});
renderTempStorage();
updateTempCountBadge();
updateTempStoreBtn();
updateTempRestoreBtn();
updateTempClearBtn();
save_data();
showToast(`✅ 已暂存 ${newNums.length} 个号码`);
addLog("select", `暂存 ${newNums.length} 个号码`);
}
function handleTempRestore() {
if (tempStorageData.length === 0) {
return;
}
if (!confirm("确定要恢复暂存号码吗？")) return;
const currentTempData = [...tempStorageData];
const restoredNums = [];
const alreadySelectedHas = [];
currentTempData.forEach(item => {
const n = item.num;
if (selectedNumbers.has(n)) {
alreadySelectedHas.push(n);
} else {
selectedNumbers.add(n);
restoredNums.push(n);
manuallyTurnedOff.delete(n);
const btn = document.querySelector(`.num-btn[data-num="${n}"]`);
if (btn) btn.classList.add('is-active');
}
if (specialNumbersSet.has(n)) {
specialNumbersSet.delete(n);
const btn = document.querySelector(`.num-btn[data-num="${n}"]`);
if (btn) btn.classList.remove('is-special');
}
if (item.isBetting) {
if (!bettingNumbers.has(n)) bettingNumbers.add(n);
} else {
if (bettingNumbers.has(n)) bettingNumbers.delete(n);
}
});
recordAction('temp_restore', '恢复号码', restoredNums, true, 0, {
restoredNums: restoredNums,
prevTempData: currentTempData,
alreadySelectedHas: alreadySelectedHas
});
tempStorageData = [];
renderTempStorage();
updateTempCountBadge();
updateTempStoreBtn();
updateTempRestoreBtn();
updateTempClearBtn();
updateAllStates();
save_data();
showToast(`✅ 已恢复 ${restoredNums.length} 个号码`);
addLog("select", `恢复 ${restoredNums.length} 个号码`);
}
function handleTempClear() {
if (tempStorageData.length === 0) {
return;
}
if (!confirm("确定要清空暂存区吗？")) return;
const prevTempData = [...tempStorageData];
recordAction('temp_clear', '清空暂存', [], false, 0, {
prevTempData: prevTempData
});
tempStorageData = [];
renderTempStorage();
updateTempCountBadge();
updateTempStoreBtn();
updateTempRestoreBtn();
updateTempClearBtn();
save_data();
showToast("🗑️ 已清空暂存区");
addLog("clear", "清空暂存");
}
function copySelectedNumbers() {
if (selectedNumbers.size === 0) { return; }
const sortedNums = Array.from(selectedNumbers).sort((a,b)=>a-b).map(fmtNum);
const textToCopy = sortedNums.join('.');
vibrate([30, 50, 30]);
navigator.clipboard.writeText(textToCopy).then(() => {
showToast("✅ 已复制已选号码");
addLog("system", "复制已选号码");
}).catch(() => {
const ta = document.createElement('textarea');
ta.value = textToCopy;
document.body.appendChild(ta);
ta.select();
document.execCommand('copy');
document.body.removeChild(ta);
showToast("✅ 已复制已选号码");
});
}
function copyBetResults() {
if (selectedNumbers.size > 0) {
    for (const num of selectedNumbers) {
        if (betResults[num] === undefined) {
            showToast("⚠️ 还有号码没有购买，不能复制");
            return;
        }
    }
}
const keys = Object.keys(betResults).map(Number);
if (keys.length === 0) {
return;
}
let textParts = [];
const amountGroups = {};
keys.forEach(num => {
const amt = betResults[num];
if (!amountGroups[amt]) amountGroups[amt] = [];
amountGroups[amt].push(num);
});
Object.keys(amountGroups).sort((a,b) => parseInt(a) - parseInt(b)).forEach(amt => {
const nums = amountGroups[amt].sort((a,b) => a - b);
const formattedNums = nums.map(fmtNum);
if (nums.length === 1) {
textParts.push(`${formattedNums[0]}买${amt}块`);
} else {
textParts.push(`${formattedNums.join('.')}各${amt}块`);
}
});
const finalText = "新奥" + textParts.join(', ');
if (!finalText || finalText === "新奥") {
return;
}
vibrate([30, 50, 30]);
navigator.clipboard.writeText(finalText).then(() => {
showToast("✅ 已复制： " + finalText);
addLog("system", "复制买号结果");
}).catch(() => {
const ta = document.createElement('textarea');
ta.value = finalText;
document.body.appendChild(ta);
ta.select();
document.execCommand('copy');
document.body.removeChild(ta);
showToast("✅ 已复制： " + finalText);
});
}
function handleReset() {
if(confirm("⚠️ 确定全部重置？\n这将清空所有选号、买号记录以及撤销/恢复历史，且无法恢复！")) {
vibrate([50, 50, 50]);
selectedNumbers.clear();
bettingNumbers.clear();
betResults = {};
undoStack = [];
redoStack = [];
inputHistory = [];
tempStorageData = [];
specialNumbersSet.clear();
currentHighlightedNumber = null;
manuallyTurnedOff.clear();
globalFreqColorMap.clear();
document.getElementById('smartInput').value = '';
lastInputValue = '';
document.querySelectorAll('.num-btn.is-special').forEach(btn => {
btn.classList.remove('is-special');
});
document.querySelectorAll('.num-btn.is-active').forEach(btn => {
btn.classList.remove('is-active');
});
renderTempStorage();
updateTempCountBadge();
updateTempStoreBtn();
updateTempRestoreBtn();
updateTempClearBtn();
const logContainer = document.getElementById('logContainer');
logContainer.innerHTML = '<div class="log-item" style="color:#718096; justify-content:center;">暂无记录</div>';
save_data();
renderBetResults();
updateAllStates();
addLog("clear", "重置全部");
}
}
function randomSpecialNumber() {
if (isRandomRunning) return;
if (selectedNumbers.size === 0) {
return;
}
const availableNumbers = Array.from(selectedNumbers).filter(n => !specialNumbersSet.has(n));
if (availableNumbers.length === 0) {
showToast("🎉 所有号码已是特码");
return;
}
isRandomRunning = true;
const randomBtn = document.getElementById('randomSpecialBtn');
randomBtn.classList.add('running');
randomBtn.disabled = true;
let speed = 50;
let elapsed = 0;
const duration = 5000;
let currentHighlight = null;
const runAnimation = () => {
if (elapsed >= duration) {
if (currentHighlight) currentHighlight.classList.remove('gold-highlight');
const finalNum = availableNumbers[Math.floor(Math.random() * availableNumbers.length)];
const label = fmtNum(finalNum);
recordAction('special_add', label, [finalNum], true);
specialNumbersSet.add(finalNum);
const finalBtn = document.querySelector(`.num-btn[data-num="${finalNum}"]`);
if (finalBtn) {
finalBtn.classList.add('is-special');
}
updateAllStates();
randomBtn.classList.remove('running');
randomBtn.disabled = false;
isRandomRunning = false;
vibrate([50, 50, 50, 50, 50]);
showToast(`🌟 新增特码：${fmtNum(finalNum)}`);
addLog("random", `新增特码 ${fmtNum(finalNum)}`);
save_data();
return;
}
if (currentHighlight) {
currentHighlight.classList.remove('gold-highlight');
}
const tempIndex = Math.floor(Math.random() * availableNumbers.length);
const tempNum = availableNumbers[tempIndex];
const btn = document.querySelector(`.num-btn[data-num="${tempNum}"]`);
if (btn) {
btn.classList.add('gold-highlight');
currentHighlight = btn;
}
if (elapsed < duration * 0.6) {
speed += 10;
} else if (elapsed < duration * 0.8) {
speed += 30;
} else {
speed += 80;
}
elapsed += speed;
setTimeout(runAnimation, speed);
};
runAnimation();
}

renderKillControls();
renderSelectZodiacButtons();
renderSelectWaveButtons();
load_data();
renderGrid();
setupInputListener();
document.getElementById('betConfirmBtn').onclick = confirmBet;
updateRandomSpecialButtonState();
updateBetConfirmButtonState();

updateOCRButtonState();

window.addEventListener('beforeunload', function() {
save_data();
});
}
init();
let lastTouchEnd = 0;
document.addEventListener('touchend', function (event) {
const now = (Date.now());
if (now - lastTouchEnd <= 300) event.preventDefault();
lastTouchEnd = now;
}, false);
document.addEventListener('gesturestart', function(event) {
event.preventDefault();
});
function checkBetFocus() {
if (bettingNumbers.size === 0) {
const input = document.getElementById('betAmountInput');
input.blur();
return false;
}
return true;
}
