const CACHE_VERSION = 'v23-compact-big-font';
const CACHE_NAME = `lucky666-${CACHE_VERSION}`;
const swCode = `const CACHE_NAME='${CACHE_NAME}';self.addEventListener('install',e=>{self.skipWaiting();e.waitUntil(caches.open(CACHE_NAME).then(c=>c.addAll(['./'])));});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(x=>x!==CACHE_NAME).map(x=>caches.delete(x)))));self.clients.claim();});self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));});`;
navigator.serviceWorker.register(URL.createObjectURL(new Blob([swCode], {type: 'application/javascript'}))).catch(console.error);
}
const manifestData = {"name":"幸运666","short_name":"幸运666","start_url":".","display":"standalone","background_color":"#eef2f5","theme_color":"#eef2f5","orientation":"portrait","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23e53e3e'/%3E%3Ctext x='50' y='65' font-family='Arial' font-size='42' font-weight='900' fill='white' text-anchor='middle' style='filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.3));'%3E666%3C/text%3E%3Ctext x='50' y='85' font-family='Arial' font-size='12' font-weight='bold' fill='white' text-anchor='middle' opacity='0.9'%3E幸运%3C/text%3E%3C/svg%3E","sizes":"192x192","type":"image/svg+xml"}]};
document.querySelector('#manifest-placeholder').setAttribute('href', URL.createObjectURL(new Blob([JSON.stringify(manifestData)], {type: 'application/json'})));

let lastTouchEnd = 0;
document.addEventListener('touchend', e => { if (Date.now() - lastTouchEnd <= 300) e.preventDefault(); lastTouchEnd = Date.now(); }, false);
document.addEventListener('contextmenu', e => { if(e.target.tagName !== 'INPUT') e.preventDefault(); });

const zodiacs = ["鼠", "牛", "虎", "兔", "龙", "蛇", "马", "羊", "猴", "鸡", "狗", "猪"];
const zodiacColors = ['red', 'blue', 'green', 'red', 'blue', 'green', 'red', 'blue', 'green', 'red', 'blue', 'green'];
const redGroup = new Set([7, 2, 1, 12, 8, 19, 18, 13, 24, 23, 30, 29, 35, 34, 40, 46, 45]);
const greenGroup = new Set([6, 5, 11, 17, 16, 22, 21, 28, 27, 33, 32, 43, 39, 38, 44, 49]);
const blueGroup = new Set([4, 3, 10, 9, 15, 14, 20, 31, 26, 25, 36, 42, 41, 37, 48, 47]);
const wuxingGroups = { gold: new Set([5, 4, 12, 13, 27, 26, 35, 34, 42, 43]), wood: new Set([9, 8, 24, 16, 17, 25, 46, 47, 38, 39]), water: new Set([1, 22, 23, 14, 15, 30, 31, 45, 44]), fire: new Set([3, 2, 11, 10, 18, 19, 33, 32, 48, 49, 40, 41]), earth: new Set([7, 6, 20, 21, 28, 29, 36, 37]) };
const numToWuxing = {};
const wuxingChars = { gold: '金', wood: '木', water: '水', fire: '火', earth: '土' };
for (const [type, nums] of Object.entries(wuxingGroups)) nums.forEach(n => numToWuxing[n] = type);

const customGridRows = [[7, 6, 5, 4, 3, 2, 1, 12, 11, 10, 9, 8], [19, 18, 17, 16, 15, 14, 13, 24, 23, 22, 21, 20], [31, 30, 29, 28, 27, 26, 25, 36, 35, 34, 33, 32], [43, 42, 41, 40, 39, 38, 37, 48, 47, 46, 45, 44], [null, null, null, null, null, null, 49, null, null, null, null, null]];

let selectedNumbers = new Set(), manuallySelected = new Set();
let historyStack = [], futureStack = [];
const MAX_HISTORY = 50;

function vibrate(pattern = 15) { if (navigator.vibrate) navigator.vibrate(pattern); }

function init() { 
    renderControls(); 
    load_data(); 
    renderGrid(); 
    updateAllStates(); 
    setupInputListener(); 
    if(historyStack.length === 0) addLog("系统", "启动"); 
}

function setupInputListener() { 
    document.getElementById('smartInput').addEventListener('keydown', e => { 
        if (e.key === 'Enter') { e.preventDefault(); handleConfirm(); } 
    }); 
}

function handleConfirm() { 
    const input = document.getElementById('smartInput'); 
    const text = input.value.trim(); 
    if (!text) { showToast("⚠️ 请输入号码"); return; } 
    processInput(text); 
    input.value = ''; input.blur(); 
}

function processInput(text) {
    const matches = text.match(/\d+/g); 
    if (!matches) { showToast("⚠️ 未识别到有效数字"); return; }
    const validNumbers = []; 
    matches.forEach(m => { 
        let n = parseInt(m, 10); 
        if (n >= 1 && n <= 49 && !validNumbers.includes(n)) validNumbers.push(n); 
    });
    if (validNumbers.length > 0) {
        saveState(); let changed = false;
        validNumbers.forEach(n => { 
            if (!selectedNumbers.has(n)) { 
                selectedNumbers.add(n); manuallySelected.add(n); changed = true; 
            } 
        });
        if (changed) { 
            updateAllStates(); save_data(); 
            addLog("input", `批量选中 ${validNumbers.length} 个号`); 
            vibrate(30); showToast(`✅ 已点亮 ${validNumbers.length} 个号`); 
        } else {
            showToast("ℹ️ 这些号码已选中");
        }
    } else {
        showToast("⚠️ 无有效号码 (1-49)");
    }
}

function addLog(type, message) {
    const container = document.getElementById('logContainer');
    if (container.children.length === 1 && container.children[0].textContent.includes("暂无")) container.innerHTML = '';
    const now = new Date(), timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    const div = document.createElement('div'); div.className = 'log-item';
    let actionClass = 'select';
    if (type === 'undo') actionClass = 'undo';
    else if (type === 'input') actionClass = 'input';
    else if (type === 'clear') actionClass = 'clear';
    else if (type === 'random') actionClass = 'random';
    
    div.innerHTML = `<span><span class="log-time">${timeStr}</span><span class="log-action ${actionClass}">${message}</span></span>`;
    container.prepend(div); 
    if (container.children.length > 15) container.removeChild(container.lastChild);
}

function clearLogs() { 
    vibrate(30); 
    document.getElementById('logContainer').innerHTML = '<div class="log-item" style="color:#718096; justify-content:center;">暂无记录</div>'; 
}

function saveState() {
    if (historyStack.length >= MAX_HISTORY) historyStack.shift();
    historyStack.push({ selected: new Set(selectedNumbers), manual: new Set(manuallySelected) });
    futureStack = []; 
    save_data();
}

function undoAction() {
    if (historyStack.length === 0) { showToast("⚠️ 无操作可撤回"); return; }
    vibrate([10, 30, 10]);
    futureStack.push({ selected: new Set(selectedNumbers), manual: new Set(manuallySelected) });
    restoreState(historyStack.pop()); 
    addLog("undo", "撤回操作"); 
    save_data(); 
    showToast("↩️ 已撤回");
}

function redoAction() {
    if (futureStack.length === 0) { showToast("⚠️ 无操作可恢复"); return; }
    vibrate([10, 30, 10]);
    if (historyStack.length >= MAX_HISTORY) historyStack.shift();
    historyStack.push({ selected: new Set(selectedNumbers), manual: new Set(manuallySelected) });
    restoreState(futureStack.pop()); 
    addLog("undo", "恢复操作"); 
    save_data(); 
    showToast("↪️ 已恢复");
}

function restoreState(state) {
    selectedNumbers = state.selected; 
    manuallySelected = state.manual;
    updateAllStates(); 
    document.getElementById('smartInput').value = '';
}

function randomSpecialNumber() {
    saveState();
    const allNums = Array.from({length: 49}, (_, i) => i + 1);
    const target = allNums[Math.floor(Math.random() * 49)];
    const wasSelected = selectedNumbers.has(target);
    
    if (wasSelected) {
        selectedNumbers.delete(target);
        manuallySelected.delete(target);
        addLog("random", `随机取消 ${target < 10 ? '0'+target : target}`);
        showToast(`❌ 随机取消 ${target}`);
    } else {
        selectedNumbers.add(target);
        manuallySelected.add(target);
        addLog("random", `随机选中 ${target < 10 ? '0'+target : target}`);
        showToast(`✅ 随机选中 ${target}`);
    }
    
    vibrate(30);
    save_data();
    updateAllStates();
}

function renderControls() {
    const headWuxingContainer = document.getElementById('head-wuxing-controls'), tailContainer = document.getElementById('tail-controls');
    const killHeadWuxingContainer = document.getElementById('kill-head-wuxing-controls'), killTailContainer = document.getElementById('kill-tail-controls');
    const killParityContainer = document.getElementById('kill-parity-controls');
    const wuxingLabels = [ { key: 'gold', label: '金' }, { key: 'wood', label: '木' }, { key: 'water', label: '水' }, { key: 'fire', label: '火' }, { key: 'earth', label: '土' } ];

    for (let i = 0; i <= 4; i++) { 
        const btn = document.createElement('button'); 
        btn.className = 'filter-btn'; 
        btn.textContent = i; 
        btn.onclick = () => { vibrate(20); btn.classList.toggle('active'); }; 
        headWuxingContainer.appendChild(btn); 
    }
    wuxingLabels.forEach(item => { 
        const btn = document.createElement('button'); 
        btn.className = 'filter-btn'; 
        btn.textContent = item.label; 
        btn.onclick = () => { vibrate(20); btn.classList.toggle('active'); }; 
        headWuxingContainer.appendChild(btn); 
    });
    for (let i = 0; i <= 9; i++) { 
        const btn = document.createElement('button'); 
        btn.className = 'filter-btn'; 
        btn.textContent = i; 
        btn.onclick = () => { vibrate(20); btn.classList.toggle('active'); }; 
        tailContainer.appendChild(btn); 
    }

    for (let i = 0; i <= 4; i++) { 
        const btn = document.createElement('button'); 
        btn.className = 'filter-btn'; 
        btn.textContent = i; 
        btn.onclick = () => { vibrate(20); btn.classList.toggle('active'); }; 
        killHeadWuxingContainer.appendChild(btn); 
    }
    wuxingLabels.forEach(item => { 
        const btn = document.createElement('button'); 
        btn.className = 'filter-btn'; 
        btn.textContent = item.label; 
        btn.onclick = () => { vibrate(20); btn.classList.toggle('active'); }; 
        killHeadWuxingContainer.appendChild(btn); 
    });

    const waveLabel = document.createElement('span'); 
    waveLabel.className = 'row-label kill-label'; 
    waveLabel.textContent = '波'; 
    killParityContainer.appendChild(waveLabel);

    const createParityBtn = (id, text, type) => { 
        const btn = document.createElement('button'); 
        btn.className = 'filter-btn kill-btn-parity'; 
        btn.textContent = text; 
        btn.id = id; 
        btn.setAttribute('data-type', type); 
        btn.onclick = () => { vibrate(20); btn.classList.toggle('active'); }; 
        killParityContainer.appendChild(btn); 
        return btn; 
    };
    createParityBtn('k-ro', '红单', 'red'); 
    createParityBtn('k-re', '红双', 'red'); 
    createParityBtn('k-bo', '蓝单', 'blue'); 
    createParityBtn('k-be', '蓝双', 'blue'); 
    createParityBtn('k-go', '绿单', 'green'); 
    createParityBtn('k-ge', '绿双', 'green'); 

    for (let i = 0; i <= 9; i++) { 
        const btn = document.createElement('button'); 
        btn.className = 'filter-btn'; 
        btn.textContent = i; 
        btn.onclick = () => { vibrate(20); btn.classList.toggle('active'); }; 
        killTailContainer.appendChild(btn); 
    }
}

function updateAllStates() {
    document.querySelectorAll('.num-btn').forEach(btn => { 
        const num = parseInt(btn.dataset.num); 
        if(!isNaN(num)) btn.classList.toggle('is-active', selectedNumbers.has(num)); 
    });

    zodiacs.forEach((z, index) => {
        const colNumbers = []; 
        customGridRows.forEach(row => { if (row[index] !== null) colNumbers.push(row[index]); });
        const hasSelected = colNumbers.some(num => selectedNumbers.has(num));
        document.querySelectorAll(`.zodiac-btn[data-zodiac-index="${index}"]`).forEach(b => b.classList.toggle('is-active-zodiac', hasSelected));
    });

    updateResultText();
}

function updateResultText() {
    const resultDiv = document.getElementById('resultDisplay'), countDiv = document.getElementById('countDisplay'), count = selectedNumbers.size;
    countDiv.textContent = count + '个';
    if (count === 0) { resultDiv.textContent = "暂无选择"; resultDiv.style.color = "#718096"; return; }
    resultDiv.style.color = "#2d3748";
    resultDiv.innerText = Array.from(selectedNumbers).sort((a, b) => a - b).map(num => (num < 10 ? '0' + num : '' + num)).join('.');
}

function getColorClass(num) { 
    if (redGroup.has(num)) return 'bg-red'; 
    if (greenGroup.has(num)) return 'bg-green'; 
    if (blueGroup.has(num)) return 'bg-blue'; 
    return ''; 
}

function renderGrid() {
    const grid = document.getElementById('grid'); grid.innerHTML = '';
    
    zodiacs.forEach((z, index) => { 
        const btn = document.createElement('div'); 
        btn.className = `zodiac-btn`; 
        btn.setAttribute('data-color', zodiacColors[index % zodiacColors.length]);
        btn.textContent = z; 
        btn.dataset.zodiacIndex = index; 
        btn.onclick = () => { vibrate(20); btn.classList.toggle('is-active-zodiac'); }; 
        grid.appendChild(btn); 
    });

    customGridRows.forEach(row => {
        row.forEach(num => {
            if (num === null) { 
                const spacer = document.createElement('div'); 
                spacer.style.visibility = 'hidden'; 
                spacer.style.pointerEvents = 'none'; 
                grid.appendChild(spacer); 
            } else {
                const btn = document.createElement('button'); 
                const colorClass = getColorClass(num); 
                btn.className = `num-btn ${colorClass}`;
                const wxType = numToWuxing[num]; 
                const wxChar = wxType ? wuxingChars[wxType] : '';
                btn.innerHTML = `<span class="num-val">${num < 10 ? '0' + num : '' + num}</span><span class="num-wx">${wxChar}</span>`;
                btn.dataset.num = num; 
                btn.onclick = () => { vibrate(25); toggleNumber(num); }; 
                grid.appendChild(btn);
            }
        });
    });

    // 撤销按钮 (位置 4-5)
    const undoBtn = document.createElement('button'); 
    undoBtn.className = 'action-grid-btn bg-action undo-btn-grid'; 
    undoBtn.innerHTML = '<span class="btn-text">撤销</span>'; 
    undoBtn.onclick = undoAction; 
    grid.appendChild(undoBtn);

    // 随机特码按钮 (位置 6-7)
    const randomBtn = document.createElement('button'); 
    randomBtn.className = 'action-grid-btn bg-gold random-btn-grid'; 
    randomBtn.innerHTML = '<span class="btn-text">随机特码</span>'; 
    randomBtn.onclick = randomSpecialNumber; 
    grid.appendChild(randomBtn);

    // 恢复按钮 (位置 8-9)
    const redoBtn = document.createElement('button'); 
    redoBtn.className = 'action-grid-btn bg-action redo-btn-grid'; 
    redoBtn.innerHTML = '<span class="btn-text">恢复</span>'; 
    redoBtn.onclick = redoAction; 
    grid.appendChild(redoBtn);

    updateAllStates();
}

function toggleNumber(num) {
    saveState(); 
    const wasSelected = selectedNumbers.has(num);
    if (wasSelected) { 
        selectedNumbers.delete(num); 
        manuallySelected.delete(num); 
        addLog("select", `取消 ${num < 10 ? '0' + num : '' + num}`); 
    } else { 
        selectedNumbers.add(num); 
        manuallySelected.add(num); 
        addLog("select", `选中 ${num < 10 ? '0' + num : '' + num}`); 
    }
    save_data(); 
    updateAllStates();
}

function copyResult() {
    const text = document.getElementById('resultDisplay').innerText; 
    if (text.includes("暂无选择")) { showToast("无内容"); return; }
    vibrate([30, 50, 30]);
    navigator.clipboard.writeText(text).then(() => { 
        showToast("✅ 已复制"); addLog("system", "复制"); 
    }).catch(() => {
        const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast("✅ 已复制");
    });
}

function clearData() {
    if(confirm("确定清空？")) {
        vibrate([50, 50, 50]); 
        saveState(); 
        selectedNumbers.clear(); 
        manuallySelected.clear();
        futureStack = [];
        document.getElementById('smartInput').value = ''; 
        save_data(); 
        updateAllStates();
        showToast("🗑️ 已清空"); 
        addLog("clear", "清空全部");
    }
}

function setToArray(set) { return Array.from(set); }
function arrayToSet(arr) { return new Set(arr || []); }
function serializeHistory(stack) { return stack.map(state => ({ selected: setToArray(state.selected), manual: setToArray(state.manual) })); }
function deserializeHistory(serializedStack) { if (!serializedStack) return []; return serializedStack.map(item => ({ selected: arrayToSet(item.selected), manual: arrayToSet(item.manual) })); }

function save_data() {
    const data = { 
        selected: setToArray(selectedNumbers), 
        manual: setToArray(manuallySelected), 
        history: serializeHistory(historyStack), 
        future: serializeHistory(futureStack) 
    };
    localStorage.setItem('lucky666_data_v3', JSON.stringify(data));
}

function load_data() {
    let raw = localStorage.getItem('lucky666_data_v3');
    if (!raw) { 
        raw = localStorage.getItem('lucky666_data_v2'); 
        if (raw) { 
            try { 
                const d = JSON.parse(raw); 
                selectedNumbers = arrayToSet(d.selected); 
                manuallySelected = arrayToSet(d.manual); 
                save_data(); 
                return; 
            } catch(e) {} 
        } 
        return; 
    }
    try { 
        const d = JSON.parse(raw); 
        selectedNumbers = arrayToSet(d.selected); 
        manuallySelected = arrayToSet(d.manual); 
        historyStack = deserializeHistory(d.history); 
        futureStack = deserializeHistory(d.future); 
    } catch(e) {}
}

function showToast(msg) { 
    const t = document.getElementById('toast'); 
    t.textContent = msg; 
    t.classList.add('show'); 
    setTimeout(() => t.classList.remove('show'), 2000); 
}

init();
</script>
