            border: none;

            display: flex;

<body>

<script>
    // --- PWA Service Worker Registration ---
    if ('serviceWorker' in navigator) {
        const CACHE_VERSION = 'v10-wuxing-text'; 
        const CACHE_NAME = `lucky666-${CACHE_VERSION}`;
        const swCode = `
            const CACHE_NAME = '${CACHE_NAME}';
            self.addEventListener('install', e => { self.skipWaiting(); e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(['./']))); });
            self.addEventListener('activate', e => { e.waitUntil(caches.keys().then(k => Promise.all(k.filter(x => x !== CACHE_NAME).map(x => caches.delete(x))))); self.clients.claim(); });
            self.addEventListener('fetch', e => { e.respondWith(fetch(e.request).catch(() => caches.match(e.request))); });
        `;
        const blob = new Blob([swCode], {type: 'application/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(console.error);
    }

    // --- 防缩放与长按 ---
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function (event) {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) event.preventDefault();
        lastTouchEnd = now;
    }, false);
    document.addEventListener('contextmenu', event => {
        if(event.target.tagName !== 'INPUT') event.preventDefault();
    });

    const zodiacs = ["鼠", "牛", "虎", "兔", "龙", "蛇", "马", "羊", "猴", "鸡", "狗", "猪"];
    const zodiacColors = ['zodiac-bg-red', 'zodiac-bg-blue', 'zodiac-bg-green', 'zodiac-bg-red', 'zodiac-bg-blue', 'zodiac-bg-green', 'zodiac-bg-red', 'zodiac-bg-blue', 'zodiac-bg-green', 'zodiac-bg-red', 'zodiac-bg-blue', 'zodiac-bg-green'];
    
    // 波色定义
    const redGroup = new Set([7, 2, 1, 12, 8, 19, 18, 13, 24, 23, 30, 29, 35, 34, 40, 46, 45]);
    const greenGroup = new Set([6, 5, 11, 17, 16, 22, 21, 28, 27, 33, 32, 43, 39, 38, 44, 49]);
    const blueGroup = new Set([4, 3, 10, 9, 15, 14, 20, 31, 26, 25, 36, 42, 41, 37, 48, 47]);

    // 五行定义
    const wuxingGroups = {
        gold: new Set([5, 4, 12, 13, 27, 26, 35, 34, 42, 43]),
        wood: new Set([9, 8, 24, 16, 17, 25, 46, 47, 38, 39]),
        water: new Set([1, 22, 23, 14, 15, 30, 31, 45, 44]),
        fire: new Set([3, 2, 11, 10, 18, 19, 33, 32, 48, 49, 40, 41]),
        earth: new Set([7, 6, 20, 21, 28, 29, 36, 37])
    };
    
    // 数字到五行的映射 & 汉字映射
    const numToWuxing = {};
    const wuxingChars = { gold: '金', wood: '木', water: '水', fire: '火', earth: '土' };
    
    for (const [type, nums] of Object.entries(wuxingGroups)) {
        nums.forEach(n => numToWuxing[n] = type);
    }

    // 自定义网格数据生成
    function generateCustomGridData() {
        const row1 = [7, 6, 5, 4, 3, 2, 1, 12, 11, 10, 9, 8];
        const row2 = [19, 18, 17, 16, 15, 14, 13, 24, 23, 22, 21, 20];
        const row3 = [31, 30, 29, 28, 27, 26, 25, 36, 35, 34, 33, 32];
        const row4 = [43, 42, 41, 40, 39, 38, 37, 48, 47, 46, 45, 44];
        const row5 = [null, null, null, null, null, null, 49, null, null, null, null, null];
        return [row1, row2, row3, row4, row5];
    }

    const customGridRows = generateCustomGridData();

    let selectedNumbers = new Set();
    let manuallySelected = new Set();
    let activeHeads = new Set();
    let activeTails = new Set();
    let activeWuxing = new Set();
    let historyStack = [];
    let futureStack = [];
    const MAX_HISTORY = 50;

    function vibrate(pattern = 15) {
        if (navigator.vibrate) navigator.vibrate(pattern);
    }

    function init() {
        renderControls(); 
        load_data(); 
        renderGrid(); 
        updateResult();
        setupInputListener();
        if(historyStack.length > 0) {
            // 静默加载
        } else {
            addLog("系统", "启动");
        }
    }

    function setupInputListener() {
        const input = document.getElementById('smartInput');
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.keyCode === 13) {
                e.preventDefault();
                handleConfirm();
            }
        });
    }

    function handleConfirm() {
        const input = document.getElementById('smartInput');
        const text = input.value.trim();
        if (!text) {
            showToast("⚠️ 请输入数字");
            return;
        }
        processInput(text);
        input.value = '';
        input.blur();
    }

    function processInput(text) {
        const matches = text.match(/\d+/g);
        if (!matches) {
            showToast("⚠️ 未识别到有效数字");
            return;
        }

        const validNumbers = [];
        matches.forEach(match => {
            let num = parseInt(match, 10);
            if (num >= 1 && num <= 49) {
                if (!validNumbers.includes(num)) {
                    validNumbers.push(num);
                }
            }
        });

        if (validNumbers.length > 0) {
            saveState();
            let changed = false;
            validNumbers.forEach(num => {
                if (!selectedNumbers.has(num)) {
                    selectedNumbers.add(num);
                    manuallySelected.add(num);
                    changed = true;
                }
            });
            
            if (changed) {
                applyVisualStates();
                updateResult();
                save_data();
                addLog("input", `批量选中 ${validNumbers.length} 个号`);
                vibrate(30);
                showToast(`✅ 已点亮 ${validNumbers.length} 个号`);
            } else {
                showToast("ℹ️ 这些号码已选中");
            }
        } else {
            showToast("⚠️ 无有效号码 (1-49)");
        }
    }

    function addLog(type, message) {
        const container = document.getElementById('logContainer');
        if (container.children.length === 1 && container.children[0].textContent.includes("暂无")) {
            container.innerHTML = '';
        }
        const now = new Date();
        const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        const div = document.createElement('div');
        div.className = 'log-item';
        let actionClass = type === 'undo' ? 'undo' : (type === 'select' ? 'select' : (type === 'filter' ? 'filter' : (type === 'input' ? 'input' : 'clear')));
        div.innerHTML = `<span><span class="log-time">${timeStr}</span><span class="log-action ${actionClass}">${message}</span></span>`;
        container.prepend(div);
        if (container.children.length > 15) container.removeChild(container.lastChild);
    }

    function clearLogs() {
        vibrate(30);
        document.getElementById('logContainer').innerHTML = '<div class="log-item" style="color:#718096; justify-content:center;">暂无记录</div>';
    }

    function saveState() {
        if (historyStack.length >= MAX_HISTORY) historyStack.shift();
        historyStack.push({
            selected: new Set(selectedNumbers),
            manual: new Set(manuallySelected),
            heads: new Set(activeHeads),
            tails: new Set(activeTails),
            wuxing: new Set(activeWuxing)
        });
        futureStack = [];
        save_data();
    }

    function undoAction() {
        if (historyStack.length === 0) { showToast("⚠️ 无操作可撤回"); return; }
        vibrate([10, 30, 10]);
        futureStack.push({
            selected: new Set(selectedNumbers),
            manual: new Set(manuallySelected),
            heads: new Set(activeHeads),
            tails: new Set(activeTails),
            wuxing: new Set(activeWuxing)
        });
        const prevState = historyStack.pop();
        restoreState(prevState);
        addLog("undo", "撤回操作");
        save_data();
        showToast("↩️ 已撤回");
    }

    function redoAction() {
        if (futureStack.length === 0) { showToast("⚠️ 无操作可恢复"); return; }
        vibrate([10, 30, 10]);
        if (historyStack.length >= MAX_HISTORY) historyStack.shift();
        historyStack.push({
            selected: new Set(selectedNumbers),
            manual: new Set(manuallySelected),
            heads: new Set(activeHeads),
            tails: new Set(activeTails),
            wuxing: new Set(activeWuxing)
        });
        const nextState = futureStack.pop();
        restoreState(nextState);
        addLog("undo", "恢复操作");
        save_data();
        showToast("↪️ 已恢复");
    }

    function restoreState(state) {
        selectedNumbers = state.selected;
        manuallySelected = state.manual;
        activeHeads = state.heads;
        activeTails = state.tails;
        activeWuxing = state.wuxing || new Set();
        updateControlButtons();
        applyVisualStates();
        updateResult();
        document.getElementById('smartInput').value = '';
    }

    function renderControls() {
        const headContainer = document.getElementById('head-controls');
        const tailContainer = document.getElementById('tail-controls');
        const wuxingContainer = document.getElementById('wuxing-controls');

        for (let i = 0; i <= 4; i++) {
            const btn = document.createElement('button');
            btn.className = 'filter-btn'; 
            btn.textContent = i + '头';
            btn.onclick = () => { vibrate(20); toggleHead(i); }; 
            btn.id = `head-btn-${i}`;
            headContainer.appendChild(btn);
        }
        for (let i = 0; i <= 9; i++) {
            const btn = document.createElement('button');
            btn.className = 'filter-btn'; 
            btn.textContent = i + '尾';
            btn.onclick = () => { vibrate(20); toggleTail(i); }; 
            btn.id = `tail-btn-${i}`;
            tailContainer.appendChild(btn);
        }

        const wuxingLabels = [
            { key: 'gold', label: '金', class: 'wx-gold' },
            { key: 'wood', label: '木', class: 'wx-wood' },
            { key: 'water', label: '水', class: 'wx-water' },
            { key: 'fire', label: '火', class: 'wx-fire' },
            { key: 'earth', label: '土', class: 'wx-earth' }
        ];

        wuxingLabels.forEach(item => {
            const btn = document.createElement('button');
            btn.className = `filter-btn ${item.class}`;
            btn.textContent = item.label;
            btn.id = `wx-btn-${item.key}`;
            btn.onclick = () => { vibrate(20); toggleWuxing(item.key, item.label); };
            wuxingContainer.appendChild(btn);
        });

        updateControlButtons();
    }

    function updateControlButtons() {
        for (let i = 0; i <= 4; i++) {
            const btn = document.getElementById(`head-btn-${i}`);
            if(btn) btn.classList.toggle('active', activeHeads.has(i));
        }
        for (let i = 0; i <= 9; i++) {
            const btn = document.getElementById(`tail-btn-${i}`);
            if(btn) btn.classList.toggle('active', activeTails.has(i));
        }
        ['gold', 'wood', 'water', 'fire', 'earth'].forEach(key => {
            const btn = document.getElementById(`wx-btn-${key}`);
            if(btn) btn.classList.toggle('active', activeWuxing.has(key));
        });
    }

    function getColorClass(num) {
        if (redGroup.has(num)) return 'bg-red';
        if (greenGroup.has(num)) return 'bg-green';
        if (blueGroup.has(num)) return 'bg-blue';
        return '';
    }

    function padNum(num) { return num < 10 ? '0' + num : '' + num; }

    function renderGrid() {
        const grid = document.getElementById('grid'); 
        grid.innerHTML = '';
        
        zodiacs.forEach((z, index) => {
            const btn = document.createElement('div');
            btn.className = `zodiac-btn ${zodiacColors[index % zodiacColors.length]}`;
            btn.textContent = z; 
            grid.appendChild(btn);
        });

        customGridRows.forEach(row => {
            row.forEach(num => {
                if (num === null) {
                    const spacer = document.createElement('div');
                    spacer.style.visibility = 'hidden';
                    spacer.style.pointerEvents = 'none';
                    grid.appendChild(spacer);
                } else {
                    const btn = document.createElement('button');
                    const colorClass = getColorClass(num);
                    btn.className = `num-btn ${colorClass}`;
                    
                    // 获取五行汉字
                    const wxType = numToWuxing[num];
                    const wxChar = wxType ? wuxingChars[wxType] : '';
                    
                    // 内部结构：数字 + 五行字
                    btn.innerHTML = `<span class="num-val">${padNum(num)}</span><span class="num-wx">${wxChar}</span>`;
                    
                    btn.dataset.num = num;
                    btn.onclick = () => { vibrate(25); toggleNumber(num); }; 
                    grid.appendChild(btn);
                }
            });
        });

        // 撤销按钮
        const undoBtn = document.createElement('button');
        undoBtn.className = 'action-grid-btn bg-action undo-btn-grid';
        undoBtn.innerHTML = '<span class="btn-text">撤销</span>';
        undoBtn.onclick = undoAction;
        grid.appendChild(undoBtn);

        // 中间空位
        for(let i=0; i<10; i++) {
            const spacer = document.createElement('div');
            spacer.style.visibility = 'hidden';
            spacer.style.pointerEvents = 'none';
            grid.appendChild(spacer);
        }

        // 恢复按钮
        const redoBtn = document.createElement('button');
        redoBtn.className = 'action-grid-btn bg-action redo-btn-grid';
        redoBtn.innerHTML = '<span class="btn-text">恢复</span>';
        redoBtn.onclick = redoAction;
        grid.appendChild(redoBtn);

        applyVisualStates();
    }

    function applyVisualStates() {
        document.querySelectorAll('.num-btn').forEach(btn => {
            const num = parseInt(btn.dataset.num);
            if(!isNaN(num)) {
                btn.classList.toggle('is-active', selectedNumbers.has(num));
            }
        });
    }

    function getFilteredNumbers() {
        const filtered = new Set();
        if (activeHeads.size === 0 && activeTails.size === 0 && activeWuxing.size === 0) return filtered;
        
        for (let num = 1; num <= 49; num++) {
            let match = false;
            if (activeHeads.has(Math.floor(num / 10))) match = true;
            if (activeTails.has(num % 10)) match = true;
            if (activeWuxing.has(numToWuxing[num])) match = true;
            
            if (match) filtered.add(num);
        }
        return filtered;
    }

    function syncSelection(sourceType) {
        saveState();
        const filtered = getFilteredNumbers();
        const newSelection = new Set(manuallySelected);
        filtered.forEach(num => newSelection.add(num));
        
        selectedNumbers = newSelection;
        applyVisualStates(); 
        updateResult(); 
        save_data();
        if(sourceType) addLog("filter", sourceType);
    }

    function toggleNumber(num) {
        saveState();
        const wasSelected = selectedNumbers.has(num);
        if (wasSelected) { 
            selectedNumbers.delete(num); 
            manuallySelected.delete(num); 
            addLog("select", `取消 ${padNum(num)}`);
        } else { 
            selectedNumbers.add(num); 
            manuallySelected.add(num); 
            addLog("select", `选中 ${padNum(num)}`);
        }
        save_data(); 
        applyVisualStates(); 
        updateResult();
    }

    function toggleHead(h) { 
        const action = activeHeads.has(h) ? "取消" : "启用";
        activeHeads.has(h) ? activeHeads.delete(h) : activeHeads.add(h);
        updateControlButtons(); 
        syncSelection(`${action}${h}头`);
    }
    function toggleTail(t) { 
        const action = activeTails.has(t) ? "取消" : "启用";
        activeTails.has(t) ? activeTails.delete(t) : activeTails.add(t);
        updateControlButtons(); 
        syncSelection(`${action}${t}尾`);
    }

    function toggleWuxing(type, label) {
        const isActive = activeWuxing.has(type);
        const action = isActive ? "取消" : "启用";
        
        if (isActive) {
            activeWuxing.delete(type);
        } else {
            activeWuxing.add(type);
        }
        
        updateControlButtons();
        syncSelection(`${action}${label}`);
    }

    function updateResult() {
        const resultDiv = document.getElementById('resultDisplay');
        const countDiv = document.getElementById('countDisplay');
        const count = selectedNumbers.size;
        countDiv.textContent = count + '个';
        if (count === 0) { 
            resultDiv.textContent = "暂无选择"; 
            resultDiv.style.color = "#718096"; 
            return; 
        }
        resultDiv.style.color = "#2d3748";
        const sorted = Array.from(selectedNumbers).sort((a, b) => a - b);
        const formattedNumbers = sorted.map(num => padNum(num));
        resultDiv.innerText = formattedNumbers.join('.'); 
    }

    function copyResult() {
        const text = document.getElementById('resultDisplay').innerText;
        if (text.includes("暂无选择")) { showToast("无内容"); return; }
        vibrate([30, 50, 30]);
        navigator.clipboard.writeText(text).then(() => {
            showToast("✅ 已复制");
            addLog("system", "复制");
        }).catch(() => {
            const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select();
            document.execCommand('copy'); document.body.removeChild(ta); 
            showToast("✅ 已复制");
        });
    }

    function clearData() {
        if(confirm("确定清空？")) {
            vibrate([50, 50, 50]);
            saveState();
            selectedNumbers.clear(); 
            manuallySelected.clear(); 
            activeHeads.clear(); 
            activeTails.clear();
            activeWuxing.clear();
            futureStack = [];
            document.getElementById('smartInput').value = '';
            save_data(); 
            updateControlButtons(); 
            renderGrid(); 
            updateResult(); 
            showToast("🗑️ 已清空");
            addLog("clear", "清空全部");
        }
    }

    function setToArray(set) { return Array.from(set); }
    function arrayToSet(arr) { return new Set(arr || []); }

    function serializeHistory(stack) {
        return stack.map(state => ({
            selected: setToArray(state.selected),
            manual: setToArray(state.manual),
            heads: setToArray(state.heads),
            tails: setToArray(state.tails),
            wuxing: setToArray(state.wuxing || [])
        }));
    }

    function deserializeHistory(serializedStack) {
        if (!serializedStack) return [];
        return serializedStack.map(item => ({
            selected: arrayToSet(item.selected),
            manual: arrayToSet(item.manual),
            heads: arrayToSet(item.heads),
            tails: arrayToSet(item.tails),
            wuxing: arrayToSet(item.wuxing)
        }));
    }

    function save_data() {
        const data = {
            selected: setToArray(selectedNumbers), 
            manual: setToArray(manuallySelected),
            heads: setToArray(activeHeads), 
            tails: setToArray(activeTails),
            wuxing: setToArray(activeWuxing),
            history: serializeHistory(historyStack),
            future: serializeHistory(futureStack)
        };
        localStorage.setItem('lucky666_data_v2', JSON.stringify(data));
    }

    function load_data() {
        let raw = localStorage.getItem('lucky666_data_v2');
        if (!raw) {
            raw = localStorage.getItem('lucky666_data_v1');
            if (raw) {
                try {
                    const d = JSON.parse(raw);
                    selectedNumbers = arrayToSet(d.selected);
                    manuallySelected = arrayToSet(d.manual || d.selected);
                    activeHeads = arrayToSet(d.heads);
                    activeTails = arrayToSet(d.tails || d.tail);
                    activeWuxing = new Set();
                    historyStack = []; 
                    futureStack = [];
                    save_data();
                    return;
                } catch(e) { console.error("旧数据加载失败", e); }
            }
            return;
        }

        try {
            const d = JSON.parse(raw);
            selectedNumbers = arrayToSet(d.selected);
            manuallySelected = arrayToSet(d.manual);
            activeHeads = arrayToSet(d.heads);
            activeTails = arrayToSet(d.tails);
            activeWuxing = arrayToSet(d.wuxing);
            
            historyStack = deserializeHistory(d.history);
            futureStack = deserializeHistory(d.future);
        } catch(e) { console.error("数据加载失败", e); }
    }

    function showToast(msg) {
        const t = document.getElementById('toast'); 
        t.textContent = msg; 
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    init();
</script>
</body>
